function _nttDoLogin(){
  var sel=document.getElementById('ntt-sel');
  var inp=document.getElementById('ntt-pw');
  var s=sel?sel.value:'';
  var p=inp?inp.value:'';
  var people=window._nttPeople||[];
  if(!s){alert('Please select your name first.');return;}
    function tryLogin(ppl){
    var person=null;
    for(var i=0;i<ppl.length;i++){if(ppl[i].name===s){person=ppl[i];break;}}
    var errEl=document.getElementById('ntt-err');
    if(!person||!person.password){if(errEl)errEl.textContent='No password set for '+s+'. Ask your manager.';return;}
    if(p.trim().toLowerCase()===person.password.trim().toLowerCase()){if(errEl)errEl.textContent='';if(window._nttSetUser){window._nttSetUser(s);}else{window._nttPendingLogin=s;}}
    else{if(errEl)errEl.textContent='Wrong password. Try again.';}
  }
  var ppl=window._nttPeople||[];
  if(ppl.length>0){tryLogin(ppl);return;}
  var errEl=document.getElementById('ntt-err');
  if(errEl)errEl.textContent='Loading...';
  fetch('https://ntt-automark-default-rtdb.firebaseio.com/ntt.json?auth=AIzaSyCXyVGftSYpeYgR1-Cb6yaY5EE6pfOLSXI').then(function(r){return r.json();}).then(function(d){var ppl2=(d&&d.people)||[];window._nttPeople=ppl2;tryLogin(ppl2);}).catch(function(){if(errEl)errEl.textContent='Network error. Check connection.';});
}

const DAILY_ROLEPLAY={
Monday:[
  {id:1,situation:"A man walks in, body language closed, looking at his phone.",customer:"I'm just looking, I don't really need any help.",context:"Monday morning, quiet floor. First walk-in of the day. He's wearing work clothes, likely on lunch break.",options:["'OK sure, let me know if you need anything.' [walk away]","'I understand! My name is [Name] — I won't bother you at all. Is there anything specific that brought you in today, or just getting a feel for things?'","'Are you sure? We have some really great deals this week that end Friday!'","'Let me show you what just came in this morning — you'll love this one.'"],correct:1,tip:"Match defensive energy with relaxed confidence. ONE open question, then silence. Never sell to someone who said don't sell to them.",cat:"Meet & Greet"},
  {id:2,situation:"A couple walks in together. The husband is excited, the wife looks uncertain.",customer:"My husband dragged me here. I'm not convinced we need a new car right now.",context:"They have two children. The wife seems financially cautious. The husband points at a Fortuner immediately.",options:["Focus entirely on the husband since he's the motivated one.","Acknowledge her directly: 'I completely understand — a vehicle is a big decision and it makes total sense to take your time. Can I ask, what would need to be true for you to feel comfortable with this kind of purchase?'","Show them the cheapest vehicle to ease her concern about cost.","Offer a discount immediately to get her on board."],correct:1,tip:"The uncertain spouse is ALWAYS the real decision-maker. Win them first. Ask what their concern specifically is — it's usually one thing.",cat:"Meet & Greet"},
  {id:3,situation:"A customer you helped 2 weeks ago returns without calling ahead.",customer:"I'm back. I've been thinking about that Hilux you showed me. Is it still available?",context:"You remember this customer. They loved the Hilux but left without committing. You know the vehicle is still on the lot.",options:["'Yes it's still here — shall I get the keys?'","'Welcome back! I'm really glad you came back. Let me check on that Hilux right now — [call to confirm it's available]. While I do that, what specifically brought you back to it?'","'Wow you took a while! A few other people have looked at it since you were here.'","'Let me check — though honestly a vehicle like that doesn't stay long.'"],correct:1,tip:"A returning customer is a BUYING SIGNAL. Welcome them back warmly. Ask what brought them back — their answer reveals their hot button. Then confirm the vehicle before creating urgency.",cat:"Meet & Greet"},
  {id:4,situation:"Young professional, maybe 28, walks in confidently and goes straight to the luxury end of the lot.",customer:"I don't want to be shown anything under R350,000. I know what I want.",context:"He's well-dressed, confident, driving a 5-year-old Polo. He's clearly stretching his budget.",options:["Take him straight to the R350k+ section without any questions.","'Perfect, let's focus on that range. Before I show you anything, can I ask 2 quick questions? I want to make sure whatever I show you genuinely fits what you're looking for — not just the price range.'","'Our top models are in this direction' and begin your walkaround pitch immediately.","'What's your monthly budget?' — ask about finance straight away."],correct:1,tip:"Even a confident buyer with a stated preference needs the 5 needs analysis questions. Price range is NOT a needs analysis. Two quick questions before showing anything.",cat:"Needs Analysis"},
  {id:5,situation:"An older woman, maybe 60, walks in slowly. She looks nervous and uncertain.",customer:"My son told me to come here. I don't really know much about cars. I just need something reliable.",context:"She's trading in a 12-year-old Corolla. Fixed income, retired. Her son couldn't come today.",options:["Walk her to the cheapest reliable option and explain the specs.","Slow right down. 'Welcome, you're in the right place. My name is [Name]. You mentioned reliability — that's actually the easiest thing I can help you with because Toyota is known for exactly that. Can I ask — who else will be driving this vehicle with you?'","Get her a brochure and let her look at her own pace.","Call her son first to discuss what she needs."],correct:1,tip:"Amiable buyer type. Slow down. Connect as a person first. ONE question that makes her feel heard. She needs to TRUST you before she'll buy from you.",cat:"Buyer Types"},
],
Tuesday:[
  {id:1,situation:"Inbound call. The person asks for the price immediately without giving their name.",customer:"Hi, how much is the 2021 Fortuner 2.4 GD-6 you advertised on AutoTrader?",context:"It's Tuesday morning, the vehicle is priced at R385,000.",options:["'R385,000 — would you like to come in for a test drive?'","Give the price with specs: 'R385,000, 78,000km, full service history.'","'Before I give you the details — can I get your name? ... [Name], thanks. I'd love to give you the price, but honestly a photo on AutoTrader really doesn't do this vehicle justice. The moment you sit inside it, you understand the price. Are you free this afternoon, or would tomorrow morning work better for you?'","'I need to check on availability first — can I call you back?'"],correct:2,tip:"NEVER give the full price over the phone. The goal of EVERY call is ONE thing: the appointment. Give enough to create curiosity, then offer two appointment times.",cat:"Phone Skills"},
  {id:2,situation:"A customer calls and immediately says they're busy.",customer:"Listen, I've got 30 seconds. I saw your Hilux, how much is it and what's the mileage?",context:"It's a busy Tuesday. The Hilux is R440,000 with 112,000km.",options:["Respect their time — give both numbers quickly.","'Of course — the Hilux is R440k and 112k km. Are you interested?'","'I can hear you're busy — I'll be quick. The mileage is 112,000km, full service history, and in terms of price, the best conversation to have is in person because I can structure the deal differently face-to-face. What time suits you today — 2pm or 4pm?'","'Call me back when you have more time to chat.'"],correct:2,tip:"Speed matching is key. Be efficient. Give ONE detail (mileage — concrete, trust-building), pivot to appointment immediately. Two options, no open-ended question.",cat:"Phone Skills"},
  {id:3,situation:"A customer hasn't responded to your WhatsApp message for 3 days.",customer:"[You need to send the first message to re-engage them]",context:"They enquired about a 2020 Polo on Monday. You replied with details. No response since.",options:["Send: 'Hi [Name], just following up on the Polo. Are you still interested?'","Send: 'Hi [Name] — I hope the week is going well! A vehicle matching exactly what you described came in today and I thought of you specifically. I'd love to show it to you — are you free Thursday or Friday?'","Send: 'Hi [Name], just checking in...'","Wait another week before following up."],correct:1,tip:"'Just checking in' and 'still interested?' are dead phrases. Always give a NEW reason to engage. A new vehicle, a price change, a finance update — something FRESH that justifies the message.",cat:"Follow-Up"},
  {id:4,situation:"Customer from last week calls to cancel their appointment for this afternoon.",customer:"Hi, something came up at work. I can't make it today — I'll call you when I'm ready.",context:"It took you 3 calls to book this appointment. The customer was hot on a Fortuner.",options:["'No problem — call me when you're free.'","'I completely understand — work first always. Listen, I want to make sure this vehicle is still available for you when you're ready. Are you free for even 20 minutes this week — Thursday or Friday? I just want to hold it for you.'","'OK but just so you know, I can't guarantee the vehicle will still be available.'","'I understand — but we had this scheduled. Can you at least come for 30 minutes?'"],correct:1,tip:"Never let a booked appointment die without re-booking IMMEDIATELY. Acknowledge fully. Then offer two specific times. Protect the vehicle with a 'hold' — creates commitment.",cat:"Appointments"},
  {id:5,situation:"A customer enquires via AutoTrader about a vehicle but asks all questions over text.",customer:"Can you just WhatsApp me the full spec sheet, all photos, service history, and your best price?",context:"They're clearly trying to decide without coming in. The vehicle is a 2022 Corolla Quest.",options:["Send everything they asked for with a cover message.","Send one photo and a brief summary, then: 'I've sent you a taste of it — but honestly, [Name], a decision like this really deserves you sitting in it. The Corolla Quest is one of those vehicles that impresses in person far more than in photos. Are you in the area — could we find 20 minutes today or tomorrow?'","'We don't send full spec sheets over WhatsApp — you'll need to come in.'","Send everything and add: 'Let me know what you think!'"],correct:1,tip:"Giving everything over WhatsApp eliminates the need to come in. Send enough to create curiosity. A SPECIFIC invitation with two times converts 3x better than a general 'come in anytime'.",cat:"Digital Leads"},
],
Wednesday:[
  {id:1,situation:"Customer test-drove the vehicle yesterday and loved it. Today they say the price is too high.",customer:"I've been thinking — R385,000 is just too much. I found the same year Fortuner for R15,000 less at another dealer.",context:"They were genuinely excited after the test drive. Scored it 9/10.",options:["'I can speak to my manager and see if we can match it.'","'I understand — and I respect you doing your research. Let me ask: when you say same year Fortuner — is it identical mileage, service history, and condition? Because the price difference almost always comes down to one of those three things. Can I show you exactly what's in our price?'","'We can't match competitor prices but we can add a free service.'","'The other dealer's price is probably missing something — those deals are never as simple as they seem.'"],correct:1,tip:"NEVER attack the competitor. NEVER drop the price immediately. EXPLORE: is it truly comparable? Most 'cheaper' alternatives have higher mileage, missing service history, or different spec. Reframe to VALUE, not price.",cat:"Objections"},
  {id:2,situation:"Everything is agreed — vehicle, trade-in, finance. The customer suddenly says:",customer:"You know what, I think I want to sleep on it. Can I let you know tomorrow?",context:"You've been with this customer for 2 hours. This is the third time they've stalled after seeming ready.",options:["'Of course — take all the time you need.'","Immediately offer a discount to close them now.","'I completely respect that. Can I ask — when you say sleep on it, is there a specific concern I haven't fully addressed? Because I'd hate for you to go home tonight with a question I could have answered right now.'","'I need an answer today or I can't hold the vehicle.'"],correct:2,tip:"'Sleep on it' always hides a specific objection. Don't let them leave without finding out what it is. EXPLORE gently but directly. Most of the time it's one thing — finance, spouse approval, or a nagging doubt you can resolve in 5 minutes.",cat:"Objections"},
  {id:3,situation:"During the walkaround, the customer compares your vehicle to one they saw online.",customer:"But the one I saw on Cars.co.za looked basically the same and was R30,000 cheaper.",context:"You're standing at the vehicle. This is the third objection in 10 minutes.",options:["Pull out your phone and look at the Cars.co.za listing together.","'That's worth looking at properly. Can I ask what the mileage was on that one? [Pause] And did it show the full service history? The reason I ask is — R30,000 difference almost always comes down to those two things. Let me show you our service stamps.'","'Those online prices are often not accurate.'","'We can bring our price closer if that's the main issue.'"],correct:1,tip:"Use their objection as an opportunity. Compare transparently. Ask about the details of the competing vehicle — mileage and service history are almost always the explanation for the price gap. Show, don't tell.",cat:"Objections"},
  {id:4,situation:"At the trade-in valuation, the customer reacts strongly.",customer:"R65,000?! I paid R120,000 for this car 4 years ago and it's in perfect condition. That's insulting.",context:"The vehicle is a 2020 VW Polo with 95,000km. Market value is genuinely R65-70k.",options:["Explain the depreciation curve and market data.","'I completely understand — and I want you to know we're offering you fair market value based on current demand. Here's what I'd like to do: let's not look at the trade-in in isolation. Let's look at the FULL picture — your trade-in value, the vehicle you're upgrading to, and what the monthly payment looks like. That's really the number that tells you whether this deal makes sense. Can I run those numbers for you?'","'I can speak to my manager about improving the offer.'","'The market for Polo's has dropped significantly — I can show you current listings.'"],correct:1,tip:"SHIFT the conversation from trade-in value to monthly payment IMMEDIATELY. Trade-in in isolation always feels unfair. In context of the full deal, it almost always makes sense. 'Let's look at the full picture' is your phrase.",cat:"Trade-In"},
  {id:5,situation:"A customer who visited last month and went cold answers your call.",customer:"Hi. Look, I appreciated your help but I've decided to hold off. Maybe in 6 months.",context:"They were interested in a Corolla Quest. Their objection was finance approval concerns.",options:["'OK no problem — I'll check in with you in 6 months.'","'I completely understand — and I respect that. Can I ask what specifically made you decide to wait? I'm asking because things change quite quickly with our stock and financing options, and if the specific thing that stopped you last time has changed, I'd want you to know.'","'OK — but just so you know, our stock changes and the vehicle you liked may not be available in 6 months.'","'We have some amazing deals this month that you'd be crazy to miss.'"],correct:1,tip:"A cold lead who answers the phone is NOT a dead lead. They picked up — that means something. EXPLORE what specifically made them wait. It's almost always one thing that can be addressed.",cat:"Re-engagement"},
],
Thursday:[
  {id:1,situation:"End of a 3-hour interaction. Finance approved. Customer liked the vehicle. They stand up to leave.",customer:"This has been really helpful. Let me go home and think about it — I'll call you tomorrow.",context:"Everything agreed. Trade-in valued. Finance approved at R5,200/month. This is their third visit.",options:["Shake hands and say 'I'll wait for your call.'","'[Sit back down, relax.] I hear you — and I want to respect that process. But let me just recap where we are: you loved the vehicle after the test drive. Your trade-in has been valued fairly. Finance came back at R5,200/month — which is actually R200 less than you said you were comfortable with. [Pause.] What specifically is there still to think about?'","'OK — but I should let you know I have someone coming to look at it tomorrow morning.'","Offer a significant discount to close immediately."],correct:1,tip:"The SUMMARY CLOSE. List everything agreed. Then ask what's left to decide. Most of the time there is nothing — they're stalling out of habit, not logic. Make the decision feel already-made.",cat:"Closing"},
  {id:2,situation:"Customer loves the Hilux but says they can't decide without their wife.",customer:"This is 100% my vehicle but my wife needs to see it before I can commit. She's not available this week.",context:"He's visited twice. His wife works irregular hours. He's clearly the decision-maker but feels he needs her approval.",options:["'No problem — bring her in whenever she's free.'","'That makes complete sense. Question — what do you think her biggest concern will be? [Listen] OK, and what if we called her right now? I'm happy to chat to her, give her my number, and I can answer any questions she has. I can also hold this vehicle for 48 hours while you arrange for her to see it — or even take it home for the night so she can see it in your driveway.'","'I can put the vehicle on hold for 1 week while you arrange it.'","'What if you signed the paperwork and she saw it on delivery day?'"],correct:1,tip:"The PUPPY DOG CLOSE. A vehicle in their driveway overnight closes 80%+ of the time. Also: calling the spouse NOW is the fastest route. Ask what her concern will be — you can often address it without her being there.",cat:"Closing"},
  {id:3,situation:"Customer at the desk, finance printed, vehicle confirmed. They pause and look at the figures.",customer:"Can you do anything more on the price? I feel like there should be some room.",context:"This is their first time asking about price reduction. The vehicle is priced fairly at market value.",options:["'Let me speak to my manager and see what I can do.'","'I appreciate you asking directly. Here's where I am: I've already given you what I can on the finance rate, and the vehicle is priced at true market value for its condition and history. What I CAN do is [service plan / accessories / first service included]. Would that help you move forward today?'","'Unfortunately our prices are fixed.'","Immediately offer R5,000 off to avoid losing the deal."],correct:1,tip:"NEVER negotiate price without a counter-offer of equal or greater value. Add VALUE instead of reducing price. Service plan, first service, accessories — these cost you less than a discount and FEEL more generous to the customer.",cat:"Negotiation"},
  {id:4,situation:"A customer who agreed to come in at 2pm doesn't arrive. At 2:45pm you call.",customer:"Oh sorry, something came up — I'll try to come another day.",context:"This was a confirmed appointment. You turned away another customer to be available.",options:["'No problem — call me when you're ready.'","'I completely understand — things happen. I want to ask you something honest: is there anything that changed between when we spoke and now? Sometimes people feel uncertain and it's easier to avoid than to call. I'd rather you just tell me what's on your mind — I promise I won't push you.'","'I held a vehicle specifically for you — this is a bit frustrating.'","Send them a WhatsApp: 'Everything OK?'"],correct:1,tip:"A no-show is almost NEVER random. Something changed their mind — price, cold feet, spouse influence, competing option. Ask directly and honestly. This conversation recovers more appointments than any follow-up message.",cat:"Follow-Up"},
  {id:5,situation:"The customer is ready but needs the deal to include a service plan to commit.",customer:"If you can throw in a 3-year service plan, I'll sign right now.",context:"The vehicle is at full margin. A service plan costs the dealership approximately R4,500.",options:["'Let me speak to my manager — I'll see what I can do.'","'I hear you. Here's what I'll do: let me go to my manager with your offer right now, and if I can get that approved, we're done today — your choice of delivery date. Give me 5 minutes.'","'I can offer a 1-year service plan instead.'","'We don't normally include service plans but I'll try my best.'"],correct:1,tip:"When a customer gives you a SPECIFIC close condition — honour it immediately. Don't negotiate it down. Go to management with confidence. A 5-minute TO to close a deal is worth every service plan.",cat:"Closing"},
],
Friday:[
  {id:1,situation:"Friday 2pm. A walk-in who looks like a serious buyer.",customer:"I need to buy something today. I've been looking for 3 weeks and I want it sorted before the weekend.",context:"They've been to 5 dealerships. They have finance approval. They know what they want.",options:["'You've come to the right place — let me show you our stock.'","'Three weeks is a long time to be shopping — you clearly know what you want. Tell me: what has every dealership gotten wrong so far? What's stopped you signing?'","'We have excellent stock and great deals this week.'","Start with the most expensive vehicle that matches their stated preference."],correct:1,tip:"A motivated buyer who hasn't bought after 3 weeks has a specific blocker. Find it BEFORE you show them anything. Their answer is your roadmap to closing them today.",cat:"High-Intent Buyers"},
  {id:2,situation:"A long-standing customer calls you on Friday afternoon.",customer:"Hi — my neighbour is looking for a used bakkie. I told him to call you.",context:"This is a customer who bought from you 18 months ago. The referral is potentially a R440k sale.",options:["'That's amazing — tell him to call me on Monday.'","'That is so kind of you — thank you genuinely. Tell me about him: what kind of bakkie, what does he use it for, and roughly what budget is he working with? I want to make sure I have the right vehicle ready before he contacts me. Also — what's the best time to reach him today?'","'I'll give him a call if you can share his number.'","'Great — send me his WhatsApp number and I'll follow up next week.'"],correct:1,tip:"A referred lead is GOLD. Call them TODAY — Friday afternoon, not Monday. Gather intel from the referrer: vehicle type, usage, budget, best contact time. A prepared call closes 3x better than a cold call.",cat:"Referrals"},
  {id:3,situation:"Customer who bought from you 14 months ago. You're calling on a Friday afternoon.",customer:"Oh hi! The car's been amazing actually. Running perfectly. Thanks for checking in.",context:"They bought a Corolla Quest. They're clearly happy. You haven't spoken since the 3-month follow-up.",options:["'I'm really glad to hear that! If you ever need anything, you know where I am.'","'That's brilliant — I'm so glad. Listen, I know it's early but I want to ask: are you thinking at any point about upgrading or changing vehicles, or is the Corolla doing everything you need? Also — is there anyone you know who might be in the market? I'd love to look after someone you send my way the same way I looked after you.'","'Great to hear! I actually have a vehicle I think you'd love — can I tell you about it?'","'I'm calling because we have an end-of-month special.'"],correct:1,tip:"The check-in call is TWO birds: relationship maintenance AND a natural referral ask. No hard sell. Plant the upgrade seed. Ask for a referral. This 3-minute call is worth R10k-40k per year in revenue if done consistently.",cat:"After-Sale"},
  {id:4,situation:"A customer on the phone is comparing you to a competitor's service plan offer.",customer:"The other dealer is offering a free 2-year service plan. Why aren't you offering the same?",context:"You're on the phone. The customer is considering a R320,000 Polo at a competing dealer.",options:["'Let me match that — I'll include a 2-year service plan.'","'I understand — and that's a fair question. Can I ask: is the service plan the only difference between their deal and ours? Because if the vehicle, mileage, and history are comparable, there are a few things we can do — but I want to understand the full picture before I make you an offer. Would it be possible to come in today? I want to earn your business properly, not just outbid the other dealership.'","'Our vehicles are better quality, we don't need to offer service plans.'","'Service plans sound great but they have hidden costs — let me explain.'"],correct:1,tip:"Don't match competitor offers over the phone without knowing the full picture. Get them IN. In person you can present the full deal, use a TO if needed, and close. Phone negotiations always lose.",cat:"Competitor Handling"},
  {id:5,situation:"Last customer of the day, 4:45pm Friday. They're 'almost' ready.",customer:"I want this vehicle — honestly I do. But I want to sleep on it and come back Monday.",context:"They've been in 90 minutes. Finance approved. Trade-in agreed. Vehicle is exactly what they wanted. You know a colleague is also showing this vehicle Saturday.",options:["'No problem — I'll hold it for you and see you Monday.'","'I completely respect that. Can I be honest with you for a moment? I have a test drive scheduled on this vehicle tomorrow at 10am. I can't hold it without a deposit, and I'd genuinely hate for you to lose it to someone else when you've already done all the work. What would it take to put R2,000 down tonight to secure it — and if you change your mind by Monday morning, I'll refund you completely?'","'If you don't decide now, the vehicle may be gone Monday.'","Offer a big discount to close before they leave."],correct:1,tip:"Friday last-of-day requires HONEST urgency plus a LOW RISK offer. A refundable deposit removes almost all their hesitation. You're not trapping them — you're protecting both of you. This closes 70%+ of 'Monday' deals.",cat:"End of Day Close"},
],
Saturday:[
  {id:1,situation:"Power Day. Busy lot. Customer arrives with kids, looking overwhelmed.",customer:"Wow it's busy here. We don't have too much time — the kids have a sports thing at 2pm.",context:"It's 10:30am. They have 90 minutes. They enquired online about a 7-seater.",options:["'Let me show you our 7-seaters quickly.'","'Perfect — let's make every minute count. I have the exact vehicles you're looking for ready to show you. Before we go — quick question: is space for the kids or the monthly payment more important today?'","'No rush, take your time — the kids will enjoy looking at the cars.'","Give them the brochure and let them browse."],correct:1,tip:"Time-constrained customers need STRUCTURE. Tell them you have a plan, execute it efficiently. ONE key question to identify the priority, then take them directly to 2 vehicles max. Speed + organisation closes time-constrained buyers.",cat:"Saturday Traffic"},
  {id:2,situation:"Power Day. Walk-in who came specifically because of your Saturday special social media post.",customer:"I saw your WhatsApp status about the Saturday deal. What's the best price I can get today?",context:"You posted a Hilux at a special price this morning. They've seen the post and come specifically for it.",options:["Give them the posted price immediately.","'I'm really glad the post caught your attention — that Hilux is outstanding. Before we talk price, let me show you the vehicle so you understand what you're buying. Most people who come for the price end up buying for a different reason entirely. 5 minutes?'","'That price is for the specific vehicle in the post — let me check if it's still available.'","'The special is valid today only — shall I get the keys?'"],correct:1,tip:"Even a motivated buyer who came because of price needs the walkaround. Never sell on price alone — sell the vehicle, the experience, YOU. A 5-minute walkaround shifts the conversation from price to value every time.",cat:"Saturday Power Day"},
  {id:3,situation:"A family. Mother, father, and a 20-year-old daughter. The daughter keeps checking her phone.",customer:"[Father]: We're looking for something for our daughter to drive to university in Johannesburg.",context:"They're looking at a safe, reliable vehicle under R200k. The daughter seems disinterested but will be the primary driver.",options:["Direct the conversation to the father since he's paying.","Speak primarily to the DAUGHTER: '[Her name], your parents care about safety on that Joburg road — so do I. But you're the one who has to love driving it. Tell me — what matters most to YOU in a car?'","Tell them the safest vehicles in the range.","Show the most affordable reliable option."],correct:1,tip:"ALWAYS engage the actual driver, not just the payer. The daughter will influence the final decision more than anyone else. If she loves the vehicle, the sale is done. If she's indifferent, no price makes it happen.",cat:"Family Buyers"},
  {id:4,situation:"Midday Saturday. A couple who test drove earlier are back 'just to look again'.",customer:"We drove away and we keep talking about that Fortuner. But R385,000 is still a lot.",context:"They scored the test drive 9/10. They left 2 hours ago and came back voluntarily.",options:["'The fact that you came back tells me everything — this is your vehicle.'","'You drove away, couldn't stop talking about it, and came back. [Pause. Smile.] That Fortuner is trying to tell you something. Let me ask: at R5,400 a month — what is that compared to what you're spending now? If the monthly works, does the total price matter?'","'I'm glad you came back — I can offer you R10,000 off.'","'I have another customer coming at 2pm to look at it.'"],correct:1,tip:"A customer who voluntarily returns has already bought emotionally. They just need PERMISSION. Reframe from total price to monthly payment. Their return behaviour is your strongest close — use it.",cat:"Saturday Power Day"},
  {id:5,situation:"3pm Saturday. Lot is quieter. A customer who visited in the morning comes back alone.",customer:"My wife went home with the kids. I want to sign today — but I need the price to be R370,000, not R385,000.",context:"Full Saturday. He's been here twice. Vehicle is at market value. He has finance approval.",options:["'Let me speak to my manager about that price.'","'I respect you coming back and being direct with me. Here's where I am: R370k is R15k below where I need to be. What I can do is go to my manager RIGHT NOW with your offer and see if we can meet somewhere — maybe not R370k, but perhaps R375k with a first service included. Give me 5 minutes. If I come back with that, are we done today?'","'R385k is our best price — I can't move on that.'","'R15,000 is a lot but let me see what I can do.'"],correct:1,tip:"Always counter a price request with a SPECIFIC number and an added VALUE, not just a price drop. 'R375k + first service' feels more generous than just 'R377k'. Always get a commitment BEFORE you go to management: 'If I can get this, are we done?'",cat:"Saturday Closing"},
]};


var _SP={"_S1":"\"Good morning team. Today we fix the single biggest mistake that costs salesmen thousands every month. Most salespeople walk customers around a vehicle and recite specs \u2013 engine size, torque, fuel tank capacity \u2013 and the customer's eyes glaze over. They don't care about specs. They care about what the specs MEAN for their lives. After this session, every one of you will speak a language your customers actually understand.\"","_S2":"\"Yesterday we learned how to talk about vehicles in a way that connects with people. Today we take that outside. The walkaround is not a tour. You are not a guide reading facts from a brochure. You are a storyteller. You are painting a picture of what this person's life looks like once they own this vehicle. Every surface you touch, you invite them to touch. Every door you open, you open with pride. By the time this customer gets into the driver's seat, they must already feel like it belongs to them.\"","_S3":"\"Here is the truth about sales: you are not selling to 'customers'. You are selling to four completely different types of human beings who want different things, communicate differently, and make decisions differently. The salesman who treats everyone the same closes maybe 20% of his leads. The salesman who adapts to who is standing in front of him closes 40-50%. Today you learn how to read people fast.\"","_S4":"\"Here is a secret that the top 1% of car salespeople know: they never have to hard-close anyone. Because by the time they get to the price, the customer is ALREADY sold. How? They spent the first 10 minutes asking the right questions and actually listening. When you understand what a customer really needs, you stop selling a car and start solving a problem. People don't resist solutions to their problems. They embrace them.\"","_S5":"\"This is not a test to catch you out. This is a compass that shows you where you are strong and where we need to work together. Every professional athlete gets scored, reviewed, and coached. Today we do the same. I am looking for progress and honesty. The salesman who takes this seriously and identifies his gaps today will be earning significantly more by next month.\"","_S6":"\"Every single sale either starts or ends in the first 30 seconds. Before you say a word, the customer has already decided whether they trust you, like you, and feel comfortable. You cannot afford to get this wrong. The salesman who masters the meet and greet is the salesman who gets to present vehicles to more people \u2013 which means more test drives \u2013 which means more sales. It starts right here, right now.\"","_S7":"\"A customer who comes in for a scheduled appointment buys at 3 times the rate of a walk-in. Three times. Because they've made a commitment. They arrived with intention. Your job on a phone call or WhatsApp is not to answer all their questions, not to build a relationship, not to quote a price. It is one thing only: get them in the building. Everything else happens in person.\"","_S8":"\"The test drive is not a formality. It is not something you do because the customer asks. It is your most powerful closing tool, and most salespeople waste it completely. Customers who test drive buy at over 40%. Customers who don't test drive buy at under 10%. Your job is to get every single customer behind the wheel. And once they are there, your job is to let the vehicle do the selling.\"","_S9":"\"This session is about psychology. R250,000 sounds terrifying. R4,800 per month sounds manageable. Same money. Completely different emotional response. The salesman who understands how humans process large numbers will close deals that other salespeople simply cannot close. You are not hiding the price \u2013 you are presenting it in the format your customer can actually understand and say yes to.\"","_S10":"\"Closing is not manipulation. Closing is helping an indecisive person make a decision they already want to make. If a customer is sitting in front of you after a needs analysis, a walkaround, and a test drive, they want the vehicle. They are just scared. Your job as a closer is to give them permission to say yes. These 5 closes have been used by the world's top salespeople for decades. Learn them. Drill them. Make them instinctive.\"","_S11":"\"I want to change how you feel about objections starting right now. Most salespeople hear 'it's too expensive' and their heart sinks. They get defensive. They start discounting immediately. The top 1% of salespeople hear 'it's too expensive' and their eyes light up. Why? Because they know that a customer who is objecting is a customer who is still in the room, still engaged, still INTERESTED. A dead deal is a customer who walks out without saying a word. An objection is an invitation to keep selling.\"","_S12":"\"Today you get a system. A simple, repeatable, four-step process that works on every objection, every time. Sales is not about winging it. It is not about hoping the right words come to you. It is about having a framework so reliable that no matter what a customer throws at you, you know exactly what to do next. LAER. Four letters. Tattoo them on your brain.\"","_S13":"\"Every one of you will have deals this month that seem stuck. The customer likes the vehicle, the numbers are close, but something isn't moving. In those moments, you have a secret weapon that most salespeople are too proud to use: the Turn-Over. Bringing in a fresh voice is not a sign of weakness. It is a sign of strategy. A TO executed correctly closes over 30% of deals that seemed dead. That is a statistic worth paying attention to.\"","_S14":"\"Urgency is the most powerful and most misused tool in sales. When used correctly, it helps customers make decisions they want to make but keep delaying. When used dishonestly, it destroys trust permanently and costs you referrals, repeat business, and your reputation in Louis Trichardt \u2013 which is a community where people TALK. Today we learn urgency the right way: real, ethical, and powerful.\"","_S15":"\"Everything we've learned this week comes down to this: can you do it in real time, under pressure, with a real person pushing back? Reading about objections doesn't make you good at handling them. Doing it under observation does. Today we compete. The winner earns first pick of next week's leads. Everyone else watches, learns, and improves. Let's go.\"","_S16":"\"Every one of you has between 200 and 600 contacts on your phone right now. Each of those contacts has another 300 contacts. You are sitting on a network of tens of thousands of people and most of you are not using it at all. Social media is not for posting your lunch. It is the most powerful free marketing tool in the history of sales. A salesman who posts consistently to their personal network for 6 months will have customers calling THEM. That is the goal.\"","_S17":"\"A referred customer closes at 3 times the rate of a cold lead. Three times. They trust you before they walk through the door because someone they trust told them to come to you. And they cost you nothing to acquire. Yet most salespeople never ask for referrals. Because they forget. Because it feels awkward. Today we build a system so that asking for referrals becomes automatic \u2013 and so that your customers are excited to refer people to you.\"","_S18":"\"Your CRM is not an admin tool. It is not a place you log calls because the manager makes you. It is the most valuable sales asset you own. Every contact in there is money waiting to be made. The salespeople who treat their CRM as their personal business intelligence system earn 40% more than those who don't. Today we learn how to use it properly.\"","_S19":"\"The moment a customer drives away in their new vehicle is not the end of your relationship with them. It is the beginning. The salesperson who understands this will build a book of business that grows every year without cold calling, without paying for leads, without spending any money on marketing. Your existing customers, properly cared for, will generate more sales than all the AutoTrader leads in the world combined.\"","_S20":"\"Here is the difference between a team that improves every month and a team that stays the same: the team that improves has an honest, structured review of what happened and a specific plan for what comes next. Not a general 'let's do better.' A specific, measurable, committed plan. Today we do that together. What worked, what didn't, what each person is committing to next month, and what resources and coaching they need to get there.\""};
var _TH={"_T1":"WHAT IS A FEATURE?\nA feature is a fact about the vehicle. 2.0L engine. 7-seat capacity. 6-speed auto. Reverse camera. Customers cannot feel a feature. They cannot imagine their life changing because of a feature.\n\nWHAT IS A BENEFIT?\nA benefit is what the feature DOES for the customer. \"This 2.0L engine means you can overtake safely on the N1 without holding your breath \u2013 and still get great fuel economy.\" The customer can see themselves on the highway. They feel the confidence.\n\nTHE FORMULA \u2013 use this every single time:\n\"This vehicle has [FEATURE], which means you get [BENEFIT], so that you can [LIFESTYLE OUTCOME].\"\n\nREAL EXAMPLES FOR YOUR STOCK:\n\u2022 \"This has a 7-seat layout, which means your whole family travels together, so that nobody gets left behind on road trips or school runs.\"\n\u2022 \"This has a reverse camera with guidelines, which means parking in tight spaces is stress-free, so that your car stays scratch-free and your partner stops worrying.\"\n\u2022 \"This has a 70L fuel tank, which means you can drive from Louis Trichardt to Johannesburg and back without stopping, so that long trips feel easy instead of stressful.\"\n\u2022 \"This has leather seats with lumbar support, which means your back stays comfortable on long drives, so that you arrive feeling fresh, not exhausted.\"\n\u2022 \"This has a water wading depth of 800mm, which means you can cross rivers on farm roads confidently, so that no road in Limpopo stops you.\"\n\nNEVER say: \"This car has park assist.\"\nALWAYS say: \"This has park assist, which means even the tightest parking bays become easy, so that you never have to drive around the block twice looking for a spot.\"","_T2":"THE 6-POINT EMOTIONAL WALKAROUND PROCESS:\n\n1. POSITION THE CUSTOMER\nStand beside them, not in front. You are both looking at the vehicle together. You are on their team, not selling AT them.\n\n2. START AT THE FRONT\n\"Let me show you something about this vehicle that most people miss when they look online...\" [Touch the bonnet] \"Feel how solid that panel is. Toyota's build quality is legendary \u2013 there's a reason Hilux bakkies are still running after 20 years and 400,000km.\"\n\n3. MOVE TO THE SIDE\n\"Notice the roofline \u2013 it's designed not just for looks but for visibility. When you're reversing out of a petrol station or checking your mirrors on the N1, you'll notice this.\"\n\n4. THE BOOT/LOAD BED\n\"How much do you carry? [Wait for answer] Perfect \u2013 [open boot] take a look at that space. [X litres] \u2013 it swallows [specific example relevant to what they said].\"\n\n5. THE CABIN\n\"Sit in. Seriously, sit down and close the door.\" [Let them settle] \"Feel that? Notice how it sits level \u2013 that's the suspension geometry. Take your hands off the wheel for a second.\"\n\n6. THE CLOSE OF THE WALKAROUND\n\"On a scale of 1 to 10 \u2013 how does this feel so far?\" [If 7+, proceed to test drive. If below 7: \"What would make this a 10 for you?\"]\n\nEMOTIONS TO HIT EVERY TIME:\n\u2022 SAFETY \u2013 always mention it if children or family are involved\n\u2022 PRIDE \u2013 \"people will notice this in your driveway / at the office\"\n\u2022 RELIABILITY \u2013 \"the one thing you never have to worry about is this vehicle letting you down\"\n\u2022 COMFORT \u2013 \"long drives to Joburg, school runs, farm roads \u2013 this handles all of it\"","_T3":"TYPE 1 \u2013 THE ANALYTICAL (The Researcher)\nHOW TO SPOT THEM: Arrives with printed specs or phone full of comparisons. Asks very specific questions. Speaks slowly and precisely. Takes notes. Doesn't rush.\nWHAT THEY NEED: Facts. Data. Proof. Certainty. They fear making a bad decision.\nHOW TO SELL: \"According to Toyota's own reliability data...\" Give them the brochure. Give them time. Never rush them.\nNEVER DO: Don't be emotional. Don't pressure. Don't say \"trust me.\"\n\nTYPE 2 \u2013 THE EXPRESSIVE (The Dreamer)\nHOW TO SPOT THEM: Enthusiastic, talks fast, uses their hands, uses words like \"love\", \"amazing\", \"perfect.\" Often brings a friend.\nWHAT THEY NEED: Excitement. Vision. Status. \"Imagine how this looks in your driveway.\"\nHOW TO SELL: Tell stories. Paint pictures. \"I had a client last month who bought this exact colour \u2013 her colleagues couldn't stop talking about it for a week.\"\nNEVER DO: Don't bore them with specs. Don't let the energy drop.\n\nTYPE 3 \u2013 THE DRIVER (The Decision Maker)\nHOW TO SPOT THEM: Walks in fast, little small talk, direct questions, checks their watch, wants the bottom line NOW.\nWHAT THEY NEED: Efficiency. Respect for their time. Clear options. To feel in control.\nHOW TO SELL: Cut to the point. \"Here's the vehicle, here's why it fits what you told me, here's the price. What would you like to do?\" Give them two options maximum.\nNEVER DO: Don't make them wait. Don't give them 10 options. Don't over-explain.\n\nTYPE 4 \u2013 THE AMIABLE (The People Person)\nHOW TO SPOT THEM: Very friendly, lots of small talk, asks about you personally, worried about what their spouse/family will think.\nWHAT THEY NEED: Trust. Relationship. Reassurance. They need to like YOU before they'll buy from you.\nHOW TO SELL: Slow down. Ask about their family. Once they trust you, they are incredibly loyal and refer everyone they know.\nNEVER DO: Don't rush. Don't be too salesy. Don't ignore the relationship.","_T4":"THE 5 POWER QUESTIONS \u2013 ASK THESE IN ORDER, EVERY TIME:\n\nQ1: \"What do you currently drive, and what do you love \u2013 and hate \u2013 about it?\"\nWHY: This tells you everything. If they hate fuel consumption, lead with economy. If they hate the size, you know what to show them. It puts them in an open, reflective mindset.\n\nQ2: \"Who else will be driving or regularly travelling in this vehicle?\"\nWHY: Opens the family/safety conversation. If children are mentioned, safety becomes the #1 hot button. Also identifies who else influences the decision.\n\nQ3: \"Tell me about your typical week \u2013 what does your driving actually look like day-to-day?\"\nWHY: Tells you if they need fuel economy (urban commuter), ground clearance (farm roads), load capacity (business), or comfort (highway trips). Don't assume \u2013 listen.\n\nQ4: \"When you think about your next vehicle, what is the single most important thing to you?\"\nWHY: THE GOLDEN QUESTION. Their answer is your #1 hot button. Write it down visibly. Refer back to it throughout the entire sale: \"You mentioned reliability was most important \u2013 this is exactly why I want you to look at this service history...\"\n\nQ5: \"Have you thought about a monthly budget that feels comfortable for you?\"\nWHY: \"What feels comfortable?\" is empathetic. Tells you whether to present in total price or monthly payments, and what finance options to prepare.\n\nTHE LISTENING RULES:\n\u2022 Take brief notes while they speak \u2013 it shows you value what they say\n\u2022 Never interrupt \u2013 not once\n\u2022 Pause 2 seconds after they answer \u2013 they often add their most important detail in that silence\n\u2022 Reflect back: \"So if I understand correctly, reliability and boot space are your two big priorities?\" This confirms you listened and builds trust","_T5":"WEEK 1 ASSESSMENT OVERVIEW:\n\nPART A \u2013 WRITTEN TEST (20 minutes, no notes):\n10 written questions testing your retention of the week's material.\n\nPART B \u2013 LIVE MOCK SALE (10 minutes each):\nManager plays customer using one of the scenario cards. Each salesman completes:\n\u2022 Feature-to-benefit conversion (minimum 3 times during walkaround)\n\u2022 Full 6-point emotional walkaround\n\u2022 All 5 Needs Analysis questions\n\u2022 Buyer type identification (tell the manager after)\n\nSCORING RUBRIC:\n\u2022 3+ benefit statements used correctly: 10 points\n\u2022 Complete 6-point walkaround: 15 points\n\u2022 All 5 needs analysis questions asked: 15 points\n\u2022 Correct buyer type identification: 5 points\n\u2022 Overall confidence and energy: 5 points\nTOTAL: 50 points\n\nPASS MARK: 35/50\nDISTINCTION: 44/50\nBELOW 25: Mandatory repeat of Week 1 content before proceeding to Week 2\n\nMOCK SALE SCENARIO CARDS:\nCard A: Family buyer. Drives an old Corolla. 3 kids. Farm roads weekly. Safety is #1 priority. Budget R6,000/month. [Buyer type: Amiable]\nCard B: Business owner. Needs to project success. Drives a 5-year-old bakkie. Wants something that looks good but still practical. [Buyer type: Expressive]\nCard C: Researcher. Printed out specs of 4 different Fortuners. Asks technical questions immediately. Has 2 hours to decide. [Buyer type: Analytical]","_T6":"THE 5 ELEMENTS OF A PERFECT MEET & GREET:\n\n1. STAND UP AND MOVE TOWARD THEM \u2013 immediately.\nNever let a customer walk to you. The moment you see someone on the lot, stand up, put your phone face down, and walk toward them at a calm, confident pace. Not rushing \u2013 confident. This signals: \"I am here, I am ready, and you are important.\"\n\n2. SMILE \u2013 a REAL one.\nA fake smile looks fake. Customers can tell. Think of something that genuinely makes you happy before you make eye contact. A real smile reaches your eyes.\n\n3. YOUR OPENING LINE \u2013 memorise this exactly:\n\"Good [morning/afternoon], welcome to NTT Toyota Louis Trichardt. I'm [Name] \u2013 have you been with us before?\"\n\nWHY THIS WORKS:\n\u2022 Return customer \u2192 \"Yes\" \u2192 \"Wonderful, welcome back! Who did you work with last time? Let me get them for you, or I'm happy to assist.\" (LOYALTY)\n\u2022 New customer \u2192 \"No\" \u2192 \"Perfect, let me show you around \u2013 we're really proud of what we have right now.\" (CURIOSITY)\n\nTHIS IS NOT: \"Can I help you?\" (invites \"No\" or \"Just looking\")\nTHIS IS NOT: \"Are you looking for anything specific?\" (too soon \u2013 you haven't earned the right)\n\n4. TRANSITION NATURALLY \u2013 don't rush to the vehicles.\nSpend 60\u201390 seconds making them comfortable. Weather, how they found you, traffic. \"Did you drive far today?\" This is essential trust-building time, not wasted time.\n\n5. MOVE INTO THE NEEDS ANALYSIS:\n\"Before I show you anything, can I ask you a couple of quick questions? I want to make sure whatever I show you actually makes sense for you.\"\nThis shows you are different from every other pushy salesman they've encountered.","_T7":"PERFECT INBOUND CALL PROCESS:\n\nSTEP 1: Answer within 3 rings. Speed is trust.\n\"Good [morning/afternoon], NTT Toyota Louis Trichardt, this is [Name] \u2013 how can I help?\"\n\nSTEP 2: Get their name immediately.\n\"Before we go any further, can I get your name? ... [Name], great.\" Use their name 2-3 times naturally in the next minute.\n\nSTEP 3: Understand their interest.\n\"Which vehicle were you enquiring about?\" Do NOT answer any questions about the vehicle yet.\n\nSTEP 4: Create curiosity, not answers.\nCustomer: \"What's the price?\"\nYOU: \"[Name], I'd love to give you all the details, but a photo really doesn't do this vehicle justice \u2013 and neither does a number over the phone. When you see it in person and sit inside it, that's when it all makes sense. Are you free this afternoon or would tomorrow morning work better for you?\"\n\nWhy? The moment you give the full price and all the specs, you've given them everything to decide without you in the room.\n\nSTEP 5: The two-option close for the appointment.\nNEVER: \"When would you like to come in?\" (open = procrastination)\nALWAYS: \"I have [time] available today or [time] tomorrow morning \u2013 which works better for you?\"\n\nSTEP 6: Confirm and close the call.\n\"Perfect. I'll have everything ready for you at [time]. Can I confirm your cell number? And \u2013 is there anyone else coming with you? I want to make sure we have space for everyone.\"\n\nOUTBOUND CALL SCRIPT (following up a lead):\n\"Hi [Name], this is [Your Name] from NTT Toyota in Louis Trichardt. I'm calling because you enquired about our [vehicle] \u2013 I just want to make sure you haven't been waiting and that someone actually got back to you properly. Is this a good time for a quick chat?\"","_T8":"THE TEST DRIVE PROCESS:\n\nBEFORE THEY GET IN \u2013 THE SETUP:\n\"I want you to drive it exactly like it's yours. If you normally take it on the highway, let's find a highway stretch. If you take it on gravel, tell me and we'll find a dirt road. I'll be here if you have questions \u2013 otherwise I'm going to be quiet and let you get a feel for it.\"\nWHY: This removes the 'test' feeling and replaces it with an 'ownership' feeling.\n\nDURING THE DRIVE \u2013 YOUR JOB:\n\u2022 Be quiet. Let them drive. Let them feel.\n\u2022 ONE question mid-drive: \"How does it feel at this speed?\"\n\u2022 ONE feature highlight at the right moment: \"You know what you just drove over without feeling it? That pothole. The suspension on this model is specifically tuned for South African roads.\"\n\u2022 Let them make sounds of approval without interrupting\n\nAFTER THE DRIVE \u2013 THE MOST IMPORTANT MOMENT:\nBefore they open the door to get out, say:\n\"Before we go back inside \u2013 on a scale of 1 to 10, how did that feel?\"\n[Wait. Silence. Do not speak first.]\n\nINTERPRETING THE SCORE:\n\u2022 9-10: Ready to buy. \"I'm glad. Let's go inside and I'll put together the numbers for you.\"\n\u2022 7-8: Strong interest. \"Great \u2013 what would make it a 10?\" Address that specific thing.\n\u2022 5-6: Something is missing. \"What specifically didn't work for you?\" Return to needs analysis.\n\u2022 1-4: Wrong vehicle. \"OK, I appreciate your honesty. What would you want to be different?\" Find the right vehicle.\n\nNEVER DO:\n\u2022 Never get out of the car while asking the 1-10 question\n\u2022 Never ask \"So, are you interested?\" \u2013 it's weak and binary\n\u2022 Never let them return the keys to someone else \u2013 keep control of the next step","_T9":"WHY ANCHORING TO MONTHLY PAYMENTS WORKS:\n\nThe human brain cannot emotionally process a number like R280,000. It's too abstract. But R5,200 per month? That gets compared to rent, a salary deduction, a monthly expense. It becomes REAL. And real is manageable.\n\nTHE PAYMENT PRESENTATION FORMULA:\n\nNEVER open with: \"This vehicle is R285,000.\"\nALWAYS open with: \"Based on a 72-month term with a 10% deposit, you're looking at approximately R4,800 per month. Is that in the range that feels comfortable?\"\n\nWHEN THEY SAY YES:\n\"Perfect. Let's get you an accurate finance quote \u2013 we work with all the major banks and I'll find you the best rate for your profile.\"\n\nWHEN THEY SAY IT'S TOO HIGH:\n\"I understand. Let me ask \u2013 is it the monthly amount, or the deposit? Because there are a few ways we can structure this to bring the monthly down without compromising the vehicle.\"\nThen: extend the term / adjust deposit / revisit the trade-in / explore balloon payment\n\nFINANCE BASICS \u2013 KNOW THESE:\n\u2022 48 months = higher monthly, lower total interest\n\u2022 60 months = balanced option\n\u2022 72 months = lowest monthly, highest total interest paid overall\n\u2022 Balloon payment = lower monthly, large final payment at end of term\n\u2022 Deposit: every R10,000 deposit reduces monthly payment by approximately R200\u2013250 (varies by rate)\n\nTHE TRADE-IN AS A DEPOSIT:\n\"If your current vehicle values at R80,000 as a trade-in, that effectively becomes your deposit \u2013 which immediately reduces your monthly payment significantly. Let me show you what that looks like on paper.\"","_T10":"THE TOP 5 CLOSES \u2013 WITH FULL SCRIPTS:\n\nCLOSE 1: THE ASSUMPTIVE CLOSE\nUse when: The sale has progressed naturally and there are no major unresolved objections.\nScript: \"Perfect. Let me go and draw up your paperwork.\" [Stand up. Move toward your desk. Act as if it's done.]\nWhy it works: You don't ask permission. You assume the sale. Most customers who want to buy will follow the energy of confident leadership.\n\nCLOSE 2: THE ALTERNATIVE CHOICE CLOSE\nUse when: You sense hesitation between options \u2013 colour, term, deposit.\nScript: \"Which works better for you \u2013 the silver or the white?\" / \"Are you thinking 60 or 72 months?\" / \"Will you be putting down a deposit today?\"\nWhy it works: Both options result in a sale. You're giving them control while guiding the direction.\n\nCLOSE 3: THE SUMMARY CLOSE\nUse when: Everything has been agreed and they are stalling without a clear reason.\nScript: \"OK, let me recap where we are. You love the vehicle \u2013 we agreed it's perfect for your needs. The price works within your budget. We've agreed on the trade-in value.\" [Look them in the eyes.] \"What are we waiting for?\"\nWhy it works: It removes imaginary obstacles by showing there are none left.\n\nCLOSE 4: THE URGENCY CLOSE\nUse when: You have a GENUINE reason for urgency. Never fabricate this.\nScript: \"I have to be honest with you \u2013 I've had two enquiries on this specific vehicle this week. I can't hold it indefinitely, and I'd hate for you to miss out on the one that ticks all your boxes. Can we agree to move forward today?\"\nWhy it works: Real scarcity is a powerful, ethical motivator.\n\nCLOSE 5: THE PUPPY DOG CLOSE\nUse when: A customer wants their spouse/family to see it, or needs more time.\nScript: \"I completely understand. How about this \u2013 take it home for the weekend. Drive it to your family, let them sit in it, see how it feels in your driveway. I'll have the paperwork ready for Monday.\"\nWhy it works: Once the vehicle is in their driveway over the weekend, it's already theirs in their mind. Return rate is over 80%.","_T11":"THE OBJECTION REFRAME:\n\nOLD MINDSET: \"An objection means they don't want to buy.\"\nNEW MINDSET: \"An objection means they need more information, more reassurance, or more confidence before they can say yes.\"\n\nTHE THREE TYPES OF OBJECTIONS:\n\nTYPE 1 \u2013 REAL OBJECTIONS (they genuinely mean it)\n\"I genuinely cannot afford more than R5,000/month.\" \u2192 Real. Address with financial restructuring.\n\"My wife hasn't seen it.\" \u2192 Real. Address with the Puppy Dog close.\n\nTYPE 2 \u2013 EMOTIONAL OBJECTIONS (they are scared)\n\"I need to think about it.\" \u2192 Translation: \"I'm not confident enough yet.\"\n\"It's too expensive.\" \u2192 Translation: \"I'm not convinced the value matches the price.\"\nThese are NOT real objections. They are emotional friction. The solution is more value, more trust, more clarity \u2013 not a price drop.\n\nTYPE 3 \u2013 HABIT OBJECTIONS (automatic responses)\n\"I always take my time with big purchases.\"\n\"I never buy on the first visit.\"\nThese are habits. They say it without thinking. Address with: \"I completely understand. Can I ask \u2013 is there something specific that's holding you back today, or is it just a matter of process?\"\n\nTHE MOST IMPORTANT RULE:\nWhen you hear an objection, your FIRST instinct must be: LISTEN. Do not respond immediately. Nod. Say \"I understand.\" Then ask ONE question to understand what the objection is really about. 90% of objections are not what they first appear to be.","_T12":"LAER = Listen. Acknowledge. Explore. Respond.\n\nL \u2013 LISTEN (fully, without interrupting)\nWhen a customer starts an objection, be completely silent and completely present. No nodding excessively. No starting to form your response. Just listen. Make eye contact. Let them finish completely. Do not speak until they are completely done.\nWHY: Customers know when you are not really listening. And a customer who doesn't feel heard closes themselves down.\n\nA \u2013 ACKNOWLEDGE (validate their concern genuinely)\n\"I completely understand.\"\n\"That's a fair point.\"\n\"I'm glad you brought that up.\"\n\"That makes total sense.\"\nNEVER say: \"But...\" \u2013 the word 'but' erases everything you just said.\nALWAYS say: \"And...\" or \"At the same time...\" \u2013 keeps the conversation collaborative.\n\nE \u2013 EXPLORE (ask a question to understand the REAL objection)\nTHIS IS THE STEP MOST SALESPEOPLE SKIP \u2013 and it is the most important.\n\"Help me understand \u2013 when you say [repeat their exact words], what specifically concerns you about that?\"\n\"Just so I make sure I address the right thing \u2013 is it the [price / deposit / monthly / the vehicle itself]?\"\n\"What would need to be true for you to feel comfortable moving forward today?\"\nThe EXPLORE question tells you exactly what to address in your response.\n\nR \u2013 RESPOND (with a targeted, confident answer)\nOnly NOW do you respond. Because you explored first, your response is surgical \u2013 it addresses the exact concern, not a general version of the objection.\n\nLAER IN PRACTICE:\nCustomer: \"It's too expensive.\"\nL: [Listen fully \u2013 let them finish]\nA: \"I completely understand \u2013 and I appreciate you being upfront about that.\"\nE: \"Can I ask \u2013 when you say it's too expensive, are you referring to the monthly payment, the total vehicle price, or the deposit?\"\nCustomer: \"Mostly the monthly payment.\"\nR: \"Perfect \u2013 let me show you two ways we can structure this that bring the monthly down significantly while keeping you in the vehicle you love.\"","_T13":"WHAT IS A TURN-OVER (TO)?\n\nA TO is when you introduce your manager or a senior colleague into a stalled deal. The fresh voice, fresh energy, and implied authority often breaks the hesitation that has built up around you specifically.\n\nWHEN TO USE THE TO:\n\u2022 The customer has said \"no\" or \"not today\" more than twice\n\u2022 You sense a personal dynamic issue \u2013 they don't fully trust you yet\n\u2022 The customer needs to feel they are getting special treatment or senior attention\n\u2022 The deal is hanging on a number or concession that only the manager can authorise\n\u2022 You've used all your closes and the customer is still not moving\n\nTHE TO SCRIPT (what you say to the customer):\n\"[Customer Name], I really want to make this work for you. Before we let you leave today, can I take 2 minutes to introduce you to my manager [Manager Name]? He personally oversees our best client deals and he may have options I haven't been able to offer you. He's right here \u2013 would that be OK?\"\n\nTHE BRIEFING (what you say to the manager, BEFORE they go in):\n\"This customer loves the [vehicle]. We've agreed on the trade-in. The only thing holding them back is [specific issue]. Their emotional hot button is [family safety / status / fuel economy]. I'd suggest trying [specific close].\"\nThe briefing must be under 60 seconds and happen completely out of earshot.\n\nWHAT THE MANAGER DOES IN THE TO:\n\u2022 Greet warmly: \"Hi [Name], [Colleague] was telling me about you \u2013 sounds like you've done your homework today.\"\n\u2022 Re-build trust (60-90 seconds of genuine connection)\n\u2022 Address the one sticking point with fresh authority and confidence\n\u2022 Attempt the close\n\nWHAT THE SALESMAN DOES DURING THE TO:\n\u2022 Stay in the room. Your presence shows the team works together.\n\u2022 Take notes quietly \u2013 signals to the customer that this is serious.\n\u2022 Be supportive and completely silent.","_T14":"FAKE URGENCY (never use \u2013 ever):\n\"This offer expires at midnight tonight.\" [It doesn't]\n\"I have 5 people calling about this vehicle today.\" [There aren't]\n\"The price goes up tomorrow if you don't buy.\" [It doesn't]\nThese lies destroy trust. In a town like Louis Trichardt, one discovered lie spreads through networks fast. The short-term gain is never worth the long-term cost.\n\nREAL URGENCY (use confidently when true):\n\u2022 \"I do have a genuine enquiry on this vehicle from someone who came in Tuesday. I can't hold it indefinitely.\"\n\u2022 \"Our current promotional finance rate ends this Friday \u2013 after that the rate increases.\"\n\u2022 \"This is a one-owner vehicle with full service history and low mileage. These don't come up often and when they do, they go quickly.\"\n\u2022 \"We're approaching end of month and I do have one unit target remaining \u2013 I'm authorised to give a better deal today than I can offer next week.\"\n\u2022 \"This colour combination is not something we stock regularly \u2013 when it's gone, we won't see it again for months.\"\n\nTHE URGENCY LANGUAGE FORMULA:\n1. State the real urgency specifically and factually\n2. Acknowledge their autonomy: \"I'm not trying to pressure you at all\"\n3. Connect to their specific interest: \"I just know how much you loved this vehicle\"\n4. Give them the decision: \"What would you like to do?\"\n\nPOST-VISIT URGENCY CALLBACK (within 2 hours of them leaving):\n\"Hi [Name], I just wanted to touch base after your visit today. A few things happened after you left that I thought you should know about...\"\nThen deliver whatever genuine urgency exists \u2013 another enquiry, a price review, a finance rate change.","_T15":"WEEK 3 ROLE PLAY BATTLE FORMAT:\n\nSETUP: Manager plays the customer. Each salesman faces THREE objections fired in rapid succession. The team observes and scores every response.\n\nTHE OBJECTION POOL (manager selects three at random):\n\u2022 \"It's too expensive \u2013 I can get the same thing for R15,000 less somewhere else.\"\n\u2022 \"I need to think about it.\"\n\u2022 \"My trade-in value is not acceptable.\"\n\u2022 \"My wife hasn't seen it \u2013 I can't decide without her.\"\n\u2022 \"I don't trust car salespeople \u2013 every dealership I've been to has tried to trick me.\"\n\u2022 \"The monthly payment is too high \u2013 I need it under R4,500.\"\n\u2022 \"I'm not buying today, end of story. Don't even try.\"\n\nSCORING RUBRIC (each objection scored out of 10):\n\u2022 LAER applied correctly \u2013 all 4 steps visible? (3 points)\n\u2022 Response was specific and targeted, not generic? (3 points)\n\u2022 A close attempted after handling the objection? (2 points)\n\u2022 Confidence and composure under pressure? (2 points)\n\nTOTAL: 30 points maximum per salesman\n\nPRIZE: First pick of incoming leads the following week.\n\nMANAGER'S COMMITMENT: After each person's round, give exactly ONE specific positive and ONE specific improvement. Not general \u2013 specific. \"Your Acknowledge was strong. Your Explore question was too generic \u2013 you asked 'what concerns you?' when you should have asked 'is it the monthly payment or the total price?'\"","_T16":"THE PERSONAL BRAND STRATEGY FOR CAR SALESPEOPLE:\n\nPLATFORM PRIORITY FOR LOUIS TRICHARDT:\n1. WhatsApp Status (most direct, most personal \u2013 your existing trusted contacts)\n2. Facebook Personal Profile (community reach, local groups)\n3. Facebook Marketplace (active vehicle buyers, free listings)\n4. TikTok (growing rapidly in SA \u2013 reach people under 35)\n\nTHE 3-TYPE CONTENT FORMULA:\nType 1 \u2013 VEHICLES (60% of posts):\n\u2022 60-second walkaround videos with YOUR voice\n\u2022 \"Vehicle of the Day\" with price and mileage\n\u2022 New arrival alerts: \"Just arrived \u2013 before I list it online...\"\n\u2022 Before/after detailing photos\n\nType 2 \u2013 EDUCATION (30% of posts):\n\u2022 \"Did you know you can negotiate your balloon payment?\"\n\u2022 \"3 things to check on a used vehicle before you buy\"\n\u2022 \"What the difference between 60 and 72 months means for your wallet\"\n\nType 3 \u2013 PERSONALITY/TRUST (10% of posts):\n\u2022 A handover photo with a happy customer (with their permission)\n\u2022 A team achievement: \"Another great week at NTT Toyota LT\"\n\u2022 A genuine personal moment that shows who you are\n\nTHE DAILY 5-MINUTE ROUTINE:\n\u2022 07:30 daily: post one vehicle to WhatsApp status before you get out of your car\n\u2022 One Facebook post per week: \"This week's best deal\" \u2013 a proper video\n\u2022 Respond to every comment within 2 hours\n\u2022 Reply to every enquiry within 30 minutes (speed = trust = sale)\n\nTHE NON-NEGOTIABLE RULE:\nPost with your REAL face and your REAL voice. People buy from people they know and trust. A faceless vehicle photo is an advertisement. A video of YOU is a personal recommendation from someone they know.","_T17":"THE 5-STEP REFERRAL SYSTEM:\n\nSTEP 1: DELIVER AN UNFORGETTABLE BUYING EXPERIENCE\nReferrals flow from experiences, not transactions. Go beyond the sale: a personal handover, a bow on the vehicle if possible, a genuine photo moment, a warm congratulations. Make it an EVENT. People talk about events. They do not talk about transactions.\n\nSTEP 2: THE HANDOVER ASK (at delivery, not before)\nWait until the customer is sitting in their new vehicle, smiling. Then say:\n\"[Name], I am so happy for you. This vehicle is perfect for your family. Can I ask you something? Is there anyone you know who deserves an experience like this? A family member, colleague, or friend? I'd love to look after them the same way I've looked after you.\"\nSTOP TALKING. Let them think. They will almost always give you a name.\n\nSTEP 3: LEAVE 2 BUSINESS CARDS IN THE VEHICLE\nEvery single handover: put two of your cards in the glovebox.\n\"I've put two of my cards in there. If anyone asks about your new vehicle, you know where to send them.\"\n\nSTEP 4: THE 2-WEEK FOLLOW-UP\n\"Hi [Name], just checking in \u2013 how are you enjoying the [vehicle]? Any questions or anything I can help with?\"\nAfter they respond positively, add: \"I'm so glad. By the way, if you know anyone looking for a vehicle, I'd love to help them. There's a fuel voucher in it for you as a genuine thank-you.\"\n\nSTEP 5: THE REFERRAL REWARD \u2013 personally and immediately\nWhen a referral buys: R500 fuel voucher + a hand-written thank-you card + a genuine WhatsApp video message.\nSpeed and personalisation of the reward drives repeat referral behaviour.\n\nTHE REFERRAL TRACKER (set it up today):\nColumns: Customer Name | Date of Sale | Referral Name | Referral Contact | Follow-Up Date | Did They Buy? | Reward Sent?","_T18":"THE 4 LEAD CATEGORIES AND MANAGEMENT CADENCE:\n\nCATEGORY 1 \u2013 HOT LEADS (buying within 7 days)\nWho: Tested drove. Asked about finance. Mentioned a specific timeframe. Returning visitors.\nTouch frequency: DAILY \u2013 call or WhatsApp every single day without exception.\nMessage approach: Specific and direct. \"Hi [Name], just following up on the [vehicle] \u2013 I wanted to make sure I answered everything before the weekend.\" Always give them a new piece of information or a genuine reason to engage.\n\nCATEGORY 2 \u2013 WARM LEADS (potential within 30 days)\nWho: Enquired, showed interest, but no test drive or commitment yet.\nTouch frequency: Every 3-4 days.\nMessage approach: Value-add. Send a photo of a new arrival, a relevant tip, or a finance update. \"Hi [Name], a [vehicle matching their interest] just came in today \u2013 thought of you immediately.\"\n\nCATEGORY 3 \u2013 COLD LEADS (last contact 30-90 days ago)\nWho: Enquired, visited, or expressed interest but went quiet.\nTouch frequency: Weekly.\nMessage approach: Re-engagement. \"Hi [Name], I know it's been a while. I haven't forgotten about you. We've had some incredible stock arrive this week \u2013 anything I can show you that might be relevant to what you were looking for?\"\n\nCATEGORY 4 \u2013 PAST CUSTOMERS (12+ months post-sale \u2013 GOLD MINE)\nWho: People who have bought from you previously.\nTouch frequency: Monthly minimum + birthday + anniversary of purchase.\nMessage approach: Purely relationship-based. Never selling directly \u2013 always connecting. The sale happens naturally when they are ready.\n\nTHE 5 NON-NEGOTIABLE CRM RULES:\n1. Log every interaction within 24 hours \u2013 memory is unreliable.\n2. Set a follow-up reminder for every lead before you close the record.\n3. Review HOT leads first thing every single morning.\n4. A lead with no next action is a dead lead.\n5. Your CRM is private. Protect your customers' information.","_T19":"THE AFTER-SALE RELATIONSHIP CALENDAR:\n\nWEEK 1 CALL (7 days after delivery):\nScript: \"Hi [Name], this is [Your Name] from NTT Toyota. Just checking in \u2013 how are you settling into the new [vehicle]? Anything I can help with?\"\nThen: \"I'm really glad you're loving it. Don't forget \u2013 if anyone you know is looking for a vehicle, please send them my way. I'd look after them exactly the same way I looked after you.\"\nPurpose: Genuine care + catch any concerns + plant the referral seed.\n\nMONTH 1 CHECK-IN:\nScript: \"Hi [Name], how's the [vehicle] going? First service is coming up soon \u2013 you can book directly with our service department. Let me know if I can help with anything at all.\"\nPurpose: Service reminder + stay top of mind.\n\n3-MONTH CALL:\nScript: \"Hi [Name], quick check-in. Has the vehicle been performing well? Any long trips? Hope the family is enjoying it.\"\nPurpose: Relationship maintenance. Ask for referrals naturally if the moment arises.\n\n12-MONTH ANNIVERSARY CALL:\nScript: \"Hi [Name], I can't believe it's been a year already since you drove out in your [vehicle]! How's it treating you? Have you thought about where you want to be with it in the next couple of years?\"\nPurpose: Plant the upgrade seed. Buyers who feel cared for upgrade with the same salesperson over 70% of the time.\n\nBIRTHDAY CONTACT (every year):\nScript: \"Hi [Name], just wanted to wish you a very happy birthday! Hope you have a fantastic day.\"\nNo sales. No ask. Pure genuine care.\nPurpose: This is the most powerful relationship-building action you can take. People remember who called on their birthday \u2013 for years.\n\nTHE REPEAT BUSINESS MATHS:\nOne properly managed customer relationship over 5 years:\n\u2022 Potential to buy again in 3-5 years = 1 additional sale\n\u2022 Average referrals generated if properly managed = 2-3 people\n\u2022 Total potential sales from one customer = 3-4 over 5 years\nTHAT is the true value of after-sale service, calculated in real rands.","_T20":"THE MONTH-END REVIEW FRAMEWORK \u2013 5 SECTIONS:\n\nSECTION 1: THE NUMBERS (facts only \u2013 no emotion, no commentary yet)\n\u2022 Units sold per person\n\u2022 Lead-to-sale conversion rate per person\n\u2022 Which weeks were strongest and what caused it\n\u2022 Test drives completed vs sales generated from those drives\n\u2022 Referrals received vs referrals actively requested\n\nSECTION 2: WHAT WORKED (celebrate specifically \u2013 never generally)\nDo NOT say: \"Everyone did well this month.\"\nDO say: \"Michelle's conversion rate went from 18% to 31% because she started doing the 1-10 scale question after every test drive.\"\nSpecific praise creates repeatable behaviour. General praise creates nothing.\n\nSECTION 3: WHAT DIDN'T WORK (honest, constructive, zero blame)\n\"We had 12 test drives that didn't close. Let's look at what happened after the drive in those 12 cases.\"\n\"Three deals died at the pricing stage. Were we presenting in payments from the start?\"\nThe question is always: \"What could we do DIFFERENTLY?\" \u2013 never \"who is to blame?\"\n\nSECTION 4: INDIVIDUAL COMMITMENTS FOR NEXT MONTH\nEach salesman states OUT LOUD, in front of the whole team:\n\u2022 Their specific unit target for next month\n\u2022 The ONE specific skill they are committed to improving\n\u2022 The ONE action they will do differently every single day\nManager writes all commitments down. Reviews them in Week 2 standup next month.\n\nSECTION 5: RECOGNITION CEREMONY\n\u2022 Top unit seller: named and celebrated with a specific reason\n\u2022 Most improved: named and celebrated with the specific evidence\n\u2022 Most referrals generated: named and celebrated\n\u2022 Best conversion rate: named and celebrated\nRecognition changes culture. A team that celebrates specific achievement builds more of it consistently."};

<script type="text/babel">

const{useState,useRef,useEffect,useCallback,memo}=React;

// ── SMALL UI ──────────────────────────────────────────────────────────────────
function Badge({c,children}){return <span style={{display:"inline-block",padding:"2px 8px",borderRadius:99,fontSize:11,fontWeight:500,background:c+"22",color:c}}>{children}</span>;}
function Card({children,s={}}){return <div style={{background:"#fff",border:"1px solid #e8e8e4",borderRadius:12,padding:"15px 18px",marginBottom:11,...s}}>{children}</div>;}
function PBar({pct,h=7,color}){const c=color||(pct>=80?"#1E8449":pct>=50?"#C9A84C":"#C0392B");return <div style={{height:h,background:"#ebebeb",borderRadius:99,overflow:"hidden"}}><div style={{height:"100%",width:Math.min(pct,100)+"%",background:c,borderRadius:99,transition:"width .5s"}}/></div>;}
function BarChart({vals,labels,colors,maxH=90}){
  const maxV=Math.max(...vals,1);
  return <div style={{display:"flex",gap:5,alignItems:"flex-end",height:maxH+28}}>
    {vals.map((v,i)=>{const h=v>0?Math.max(Math.round((v/maxV)*maxH),6):3;return(
      <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
        <div style={{fontSize:11,fontWeight:700,color:colors?colors[i]:"#555"}}>{v}</div>
        <div style={{width:"100%",height:h,background:colors?colors[i]:"#1A6FAD",borderRadius:"4px 4px 0 0",transition:"height .4s",opacity:.9}}/>
        <div style={{fontSize:9,color:"#888",textAlign:"center",lineHeight:1.2,maxWidth:50,wordBreak:"break-word"}}>{labels[i]}</div>
      </div>
    );})}
  </div>;
}

// ── OVERLAY WRAPPER ───────────────────────────────────────────────────────────
function Overlay({onClose,children,title,wide=false,zIdx=999}){
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.6)",zIndex:zIdx,display:"flex",alignItems:"flex-start",justifyContent:"center",padding:"16px",overflowY:"auto"}} onClick={onClose}>
      <div style={{background:"#fff",borderRadius:16,width:"100%",maxWidth:wide?860:520,marginTop:8,marginBottom:24,boxShadow:"0 20px 60px rgba(0,0,0,.25)"}} onClick={e=>e.stopPropagation()} className="pop">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"16px 20px",borderBottom:"1px solid #f0f0ec",position:"sticky",top:0,background:"#fff",borderRadius:"16px 16px 0 0",zIndex:2}}>
          <div style={{fontSize:16,fontWeight:700,color:"#111"}}>{title}</div>
          <button onClick={onClose} style={{width:30,height:30,borderRadius:"50%",border:"1px solid #ddd",background:"#f5f5f5",cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center",color:"#555"}}>✕</button>
        </div>
        <div style={{padding:"16px 20px 20px"}}>{children}</div>
      </div>
    </div>
  );
}
