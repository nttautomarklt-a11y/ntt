// ── CLOSED LEADS MODAL ───────────────────────────────────────────────────────

const FULL_TRAINING=[
  {week:"Week 1",theme:"Foundation – Know Your Product & Customer",color:"#1A6FAD",days:[
  {day:"MON",short:"Feature vs Benefit",title:"Feature vs Benefit Mastery – Stop Selling Specs, Start Selling Lives",
  speech:_SP["_S1"],
  theory:_TH["_T1"],
  activity:{title:"Feature-Benefit Conversion Worksheet",instructions:"For each vehicle currently on your lot, complete this table. Every salesman must do at least 5 vehicles. Write it by hand – physical writing improves retention. Manager reviews and corrects before floor time.",
  tasks:["Pick 5 vehicles from your current stock","For each vehicle, list 4 features","Convert each feature into a full benefit statement using the formula: [Feature] → [Benefit] → [Lifestyle Outcome]","Practice saying each one OUT LOUD 3 times to a mirror or colleague","Your manager will listen to 2 of your benefit statements before you go onto the floor – no exceptions"]},
  quiz:[
  {q:"A customer asks what engine the Hilux has. The BEST response is:",opts:["'It has a 2.8L turbodiesel engine.'","'It has a 2.8L engine – great for reliability.'","'It has a 2.8L turbodiesel, which means serious pulling power, so whether you're towing a trailer or driving a farm road, this bakkie handles it without breaking a sweat.'","'I'll check the spec sheet for you.'"],ans:2},
  {q:"A benefit statement must always include:",opts:["Technical specifications","The feature, what it means for the customer, and the lifestyle outcome","The price and monthly payment","A comparison with a competitor vehicle"],ans:1},
  {q:"A customer seems bored while you explain the vehicle. Most likely reason:",opts:["They are not interested in buying","You are speaking features, not benefits – you haven't connected the vehicle to their life","The vehicle is the wrong colour","They've been to other dealerships"],ans:1},
  {q:"Complete the formula: 'This has [feature], which means ___'",opts:["'...you get the best price on the market'","'...the vehicle is very reliable'","'...you get [specific benefit], so that you can [lifestyle outcome]'","'...Toyota builds them to last'"],ans:2}],
  takeaways:["Customers buy feelings, not facts. Always translate specs into lifestyle benefits.","The formula is non-negotiable: Feature → Benefit → Lifestyle Outcome. Never skip a step.","Practice out loud – reading it is not the same as saying it confidently in front of a customer.","Every vehicle on the lot must have at least 4 benefit statements you know by heart before you can sell it."]},

  speech:_SP["_S2"],
  theory:_TH["_T2"],

  quiz:[
  {q:"Where should you stand during a walkaround?",opts:["In front of the customer, facing them","Beside the customer, both looking at the vehicle together – you are on their team","Behind the customer pointing features out","Wherever is most comfortable for you"],ans:1},

  {day:"WED",short:"4 Buyer Types",title:"The 4 Buyer Types – Identify in 3 Minutes, Close Every Time",
  speech:_SP["_S3"],

  quiz:[
  {q:"A customer hands you a spreadsheet comparing 6 vehicles before you say a word. This is most likely:",opts:["A Driver – get to the price quickly","An Expressive – show them the best-looking option","An Analytical – give them data, proof, and time","An Amiable – build a relationship first"],ans:2},
  {q:"A Driver customer is getting impatient. The best response is:",opts:["Slow down and build more rapport","Summarise clearly: 'Here's the vehicle, here's why it fits, here's the price – what would you like to do?'","Give them a detailed breakdown of all features","Ask them about their family"],ans:1},
  {q:"An Amiable customer trusts you but keeps saying they need to 'check with the family'. What do you do?",opts:["Push harder for the close","Lower the price","Slow down, acknowledge their process, and offer to call the family NOW or set a firm appointment with everyone present","Send them home with a brochure"],ans:2},
  {q:"An Expressive customer is excited about a vehicle. The most effective next step is:",opts:["Show them the service history documentation","Calculate the monthly payment","Tell them a story: 'Let me tell you about a client who bought this last week – wait until you hear what happened'","Discuss the warranty terms in detail"],ans:2}],

  {day:"THU",short:"Needs Analysis",title:"The 5 Power Questions – Know Everything You Need to Close",
  speech:_SP["_S4"],
  theory:_TH["_T4"],
  activity:{title:"Needs Analysis Role Play + Vehicle Recommendation",instructions:"Pair up. One plays the customer using the scenario below, one is the salesman. Ask all 5 questions. Take notes. Then recommend a vehicle from current stock and explain why using the customer's own words.",
  tasks:["Customer Scenario A: Drives a 2018 Polo. Has 2 kids under 10. Drives 40km daily on tar roads. Most important: reliability and safety. Budget: R5,000–R6,500/month. Ask all 5 questions. Which vehicle on your lot best matches? Give 3 reasons using their own answers.","Customer Scenario B: Drives a 1-tonne bakkie for his business. Needs something more economical. Drives farm roads twice a week. Often carries tools. Ask all 5 questions. Recommend a vehicle with justification.","SWITCH ROLES for each scenario.","After both rounds: Manager asks each salesman – what was the customer's #1 priority (Q4 answer)? If you can't remember it, you weren't listening properly.","Debrief: Which question was hardest to ask naturally? That is the one to practice most."]},
  quiz:[

  takeaways:["The 5 questions are not optional – they are the foundation of every sale. Never present a vehicle before completing them.","The best salespeople are the best listeners. Ask, then be completely quiet.","Q4 is the golden question. Whatever they say is your entire sales strategy.","Reflect back their answers to confirm you heard them. 'So what I'm hearing is...' builds enormous trust."]},

  theory:_TH["_T6"],
  activity:{title:"Meet & Greet Roleplay Drill – 5 Character Cards",instructions:"One person plays the customer entering from outside. They choose a character card. The salesman must complete all 5 elements. Manager times and scores. 3 minutes maximum per round.",
  tasks:["Card 1: DEFENSIVE – walks in looking at their phone, body language closed, doesn't want to be approached.","Card 2: EXCITED – practically runs in, 'I saw it online! Where is the Fortuner?!'","Card 3: SUSPICIOUS – 'I've been to 3 dealerships today and nobody could give me a straight answer.'","Card 4: RUSHED – 'I've got 20 minutes max, what can you show me quickly?'","Card 5: THE COUPLE – they're already slightly tense with each other, disagreeing on what they want.","After each round: team scores the salesman on all 5 elements. Specific feedback only – no vague comments."]},
  quiz:[
  {q:"Why do we say 'Have you been with us before?' instead of 'Can I help you?'",opts:["It's more professional","'Can I help you?' invites 'No' or 'Just looking' which shuts the conversation down immediately","It's part of the Toyota standard process","Customers prefer it"],ans:1},
  {q:"When should you approach a customer who has just walked onto the lot?",opts:["Wait for them to come to you so they don't feel rushed","Move toward them immediately – with calm confidence, not rushing","Wait until they've been on the lot for 2-3 minutes","Only approach if they look like they're ready to buy"],ans:1},
  {q:"The 60-90 seconds of small talk before the needs analysis is:",opts:["Wasted time that delays the sale","Essential trust-building time – customers who feel comfortable buy more often","Optional – only do it with Amiable buyer types","Too long – get to the vehicles faster"],ans:1},
  {q:"A customer says 'I'm just browsing, thanks.' Your response is:",opts:["'OK, let me know if you need anything' and walk away","Match their energy, relax: 'Absolutely – my name is [Name], I'm not going to bother you at all. Is there anything specific that brought you in today or are you just getting a feel for things?'","'Are you sure? We have some great deals today.'","'Most people who say that end up leaving with a car!'"],ans:1}],
  takeaways:["You have 30 seconds to make or break the entire sale. Every second of the meet and greet matters.","Never open with 'Can I help you?' – always use 'Have you been with us before?'","The 60-90 seconds of small talk is not wasted – it is trust currency that pays off at closing time.","Match the customer's energy and pace. Fast customers need faster energy. Cautious customers need calmer energy."]},

  {day:"TUE",short:"Appointment Setting",title:"Appointment Setting – The Phone Call That Gets People Through the Door",
  speech:_SP["_S7"],
  theory:_TH["_T7"],
  activity:{title:"Live Phone Drill – Record Yourself",instructions:"Each salesman makes 3 practice calls to team members playing customers. Record each call on your phone. Listen back and score yourself on the checklist after each call.",
  tasks:["CALL 1 – Outbound: Following up an AutoTrader enquiry for a 2021 Fortuner. Customer is interested but hasn't committed. Your goal: get the appointment.","CALL 2 – Inbound: Customer calls asking for the price of a Hilux DC 4x4. Your goal: do NOT give the price. Get the appointment.","CALL 3 – Outbound: Calling a customer who visited 4 days ago and hasn't been back in contact.","Self-scoring checklist after each call: Did you use their name 3x? Did you avoid giving the price? Did you offer exactly two appointment times? Did you confirm their cell number? Did you ask who's coming?","Listen to your recording. What do you sound like? Are you confident? Smiling? (You can hear a smile through the phone.)"]},
  quiz:[
  {q:"A customer asks for the price over the phone. You should:",opts:["Give them the price so they can make an informed decision","Tell them you don't know the price yet","Create curiosity and redirect to the appointment: 'I'd love to give you all the details – but this vehicle really needs to be seen in person. Are you free this afternoon or tomorrow morning?'","Email them a full spec sheet and follow up later"],ans:2},
  {q:"Why offer only two appointment times instead of asking 'when are you free?'",opts:["It's more professional","Two options avoid procrastination and feel easier to commit to than an open-ended question","It's quicker for you","Customers prefer limited options"],ans:1},
  {q:"The single goal of every inbound phone call or WhatsApp enquiry is:",opts:["Answering all the customer's questions so they are informed","Quoting the most competitive price","Getting the customer to come into the dealership in person","Building a long-term relationship over the phone"],ans:2},
  {q:"After setting an appointment, why ask 'Is anyone else coming with you?'",opts:["To prepare the right number of chairs","To know if a joint decision-maker will be present – and to further commit the customer to the appointment","To sound thorough","For security purposes"],ans:1}],
  takeaways:["Never give the price or all the specs over the phone – give enough to create curiosity, then get the appointment.","Two appointment options close 3 times more appointments than asking 'when are you free?'","Confirming appointments the evening before increases show-up rate by 40%. Always do it.","Record yourself on a practice call tonight and listen back. You will be surprised by what you hear."]},

  {day:"WED",short:"Test Drive",title:"The Test Drive That Closes Itself – Before You Touch the Wheel",
  speech:_SP["_S8"],
  theory:_TH["_T8"],
  activity:{title:"Test Drive Simulation + Post-Drive Script Drill",instructions:"Using a vehicle on the lot (engine off to keep it safe), each salesman runs the full test drive sequence with a team member as the customer.",
  tasks:["Setup: Deliver the pre-drive instruction speech – word for word as written above. No ad-libbing yet.","During: Ask ONE question at an appropriate moment mid-drive.","After: Deliver the 1-10 question while still seated inside the vehicle.","Respond correctly to: 10/10 response | 7/10 response | 4/10 response – all three scenarios.","Scoring: Pre-drive setup (5pts) | Mid-drive question timing (5pts) | 1-10 question delivery (5pts) | Response to each score scenario (10pts) | Overall energy (5pts) = 30 pts total"]},
  quiz:[
  {q:"What is the conversion rate of customers who complete a test drive?",opts:["About 15%","Over 40%","About 25%","About 60%"],ans:1},
  {q:"During the test drive, your primary role is to:",opts:["Explain every feature as they drive","Be mostly quiet and let them experience the vehicle – the vehicle is selling itself","Ask multiple questions to keep them engaged","Deal with other customers if the floor is busy"],ans:1},
  {q:"A customer gives you a 6/10 after the test drive. You say:",opts:["'Let's go inside and work out the numbers.'","'What would make it a 10 for you?' – then specifically address that thing","'OK, this is probably not the right vehicle for you then.'","'Most people feel the same way at first – it grows on you.'"],ans:1},
  {q:"When exactly do you ask the 1-10 question?",opts:["As they are getting out of the vehicle","While still inside the car, before they open the door","When you're back inside at your desk","After showing them the price"],ans:1}],
  takeaways:["Never skip the test drive. It is your single most powerful closing tool. Period.","The pre-drive instruction – 'drive it like it's yours' – transforms the experience from a test into a preview of ownership.","The 1-10 question is non-negotiable. It tells you exactly where you stand. Ask it while still in the vehicle.","Be quiet during the drive. The vehicle is doing the selling. Don't talk over it."]},

  {day:"THU",short:"Payment Anchoring",title:"Payment Anchoring – Present in Payments, Not in Total Price",
  speech:_SP["_S9"],
  theory:_TH["_T9"],
  activity:{title:"Finance Calculator Drill – 5 Real Scenarios",instructions:"Using your dealership's finance calculator, work out the monthly payment for each scenario. Write your answer AND how you would present it to the customer in natural language.",
  tasks:["Vehicle: R195,000. 72 months. 10% deposit. Calculate the monthly payment. Write exactly how you present this to the customer.","Vehicle: R320,000. 60 months. 20% deposit. Customer says 'I need it below R5,500/month.' What are your options?","Customer's trade-in is valued at R65,000. They want a R240,000 vehicle. Walk through the full deal structure out loud to a partner.","Customer says 'I don't want to pay more than R4,000/month.' Vehicle is R230,000. What do you do? List all available levers.","A customer is scared of a balloon payment. Explain the difference between a balloon and no-balloon deal in plain, non-technical language that any customer would understand."]},
  quiz:[
  {q:"Why do we present monthly payments before the total vehicle price?",opts:["Because it hides the real cost from the customer","Because the brain can emotionally process a monthly number better than a total – same money, but easier to say yes to","Because total price is not important","To confuse the customer"],ans:1},
  {q:"A customer says 'the monthly is too high.' Your FIRST response is:",opts:["Lower the vehicle price immediately","Offer a discount","Ask: 'Is it the monthly that's the issue, or the deposit? There are a few ways we can structure this to bring it down.'","Show them a cheaper vehicle immediately"],ans:2},
  {q:"What happens to total interest paid when you extend from 60 to 72 months?",opts:["It decreases","It stays the same","It increases – lower monthly but more total interest over the longer term","It depends on the vehicle"],ans:2},
  {q:"A R80,000 trade-in is best described to the customer as:",opts:["A discount on the price","Cash in the customer's pocket","Effectively their deposit, which reduces their monthly payment significantly","A bonus from the dealership"],ans:2}],
  takeaways:["Never anchor the conversation to total price. Always anchor to monthly payment.","Monthly payment = manageable. Total price = scary. Same money. Different psychology. Different outcome.","When a customer says the monthly is too high, there are always structural solutions before you reduce the vehicle price.","The trade-in as a deposit is a powerful reframe that reduces monthly payments without touching the vehicle price at all."]},

  {day:"FRI",short:"Top 5 Closes",title:"The Top 5 Closes – Master These and You'll Never Lose a Deal on Hesitation",
  speech:_SP["_S10"],
  theory:_TH["_T10"],
  activity:{title:"Closing Battle Drill – Tournament Style",instructions:"Each salesman attempts all 5 closes against the manager playing a hesitant customer. Manager plays the same scenario for everyone. Team scores. Highest scorer earns first pick of leads next week.",
  tasks:["Manager scenario 1: 'I love the vehicle and the price works... but I just want to think about it over the weekend.' → Use an appropriate close.","Manager scenario 2: 'I can't decide between the silver and the pearl white.' → Use the Alternative Choice close.","Manager scenario 3: 'I'm ready but I want my wife to see it first.' → Use the Puppy Dog close.","Manager scenario 4: Everything is agreed. The customer just hasn't said yes. → Use the Summary close.","Manager scenario 5: You genuinely have another enquiry on the vehicle. → Use the Urgency close without being pushy."]},
  quiz:[
  {q:"The Assumptive Close works best when:",opts:["You think the customer might be interested","The sale has progressed naturally with no major unresolved objections remaining","The customer has explicitly said they want to buy","You want to pressure the customer into deciding"],ans:1},
  {q:"The Urgency Close should ONLY be used when:",opts:["You need to hit your monthly target","The customer is taking too long and patience is running out","There is a genuine, verifiable reason for urgency – never fabricate it","It's the last week of the month"],ans:2},
  {q:"The Puppy Dog Close is most appropriate when:",opts:["A customer loves the vehicle but their spouse or family hasn't seen it yet","A customer is asking about colour options","The customer wants to negotiate on price","The customer has only just arrived and done the walkaround"],ans:0},
  {q:"The Summary Close is most effective when:",opts:["The customer has an unresolved objection about price","Everything has been agreed but the customer is stalling without a clear reason","The customer is still deciding between two vehicles","You haven't completed the test drive yet"],ans:1}],
  takeaways:["Closing is not pressure – it is helping a willing customer make the decision they already want to make.","Drill all 5 closes until they are reflexive. Reading them is not enough – say them out loud daily this week.","Use the Puppy Dog close with confidence – a vehicle in someone's driveway over the weekend comes back sold over 80% of the time.","Never fabricate urgency. A customer who discovers false urgency never trusts you again – and in Louis Trichardt, they tell people."]}
  ]},

  {week:"Week 3",theme:"Objection Mastery & Advanced Closing",color:"#A93226",days:[
  {day:"MON",short:"Objections=Buying Signals",title:"Why Objections Are Buying Signals – Reframe Everything",
  speech:_SP["_S11"],
  theory:_TH["_T11"],
  activity:{title:"Objection Identification Workshop – 10 Scenarios",instructions:"Manager calls out 10 objections. Team writes: (1) Which type of objection? (2) What is the REAL underlying concern? (3) What is the first thing you would say?",
  tasks:["'It's too expensive.' → Type? Real concern? First response?","'I need to sleep on it.' → Type? Real concern? First response?","'I always shop around before I decide.' → Type? Real concern? First response?","'My wife says we should wait until next year.' → Type? Real concern? First response?","'The trade-in value is not what I expected.' → Type? Real concern? First response?","'I can get it cheaper online.' → Type? Real concern? First response?","'I don't like the colour options available.' → Type? Real concern? First response?","'I need to check my finances first.' → Type? Real concern? First response?","'I'm not ready to commit today.' → Type? Real concern? First response?","'I want to think about it over the weekend.' → Type? Real concern? First response?","After completing: compare answers as a team. Where do you disagree? Disagreements reveal the most interesting learning."]},
  quiz:[
  {q:"A customer walks out without saying a word. This means:",opts:["They are coming back tomorrow","The deal is dead – no engagement means no opportunity to close","They are thinking about it carefully","They need more time and space"],ans:1},
  {q:"'I need to think about it' is most often:",opts:["A real objection about finances","An emotional objection meaning they need more confidence or information – not a price issue","A habit objection","A clear sign they don't like the vehicle"],ans:1},
  {q:"When you first hear an objection, your first instinct should be:",opts:["Respond immediately with your best counter-argument","Offer a discount before they ask for one","Listen fully, nod, say 'I understand', then ask ONE question to understand what the objection is really about","Involve your manager immediately"],ans:2},
  {q:"Which objection type is the hardest to overcome and why?",opts:["Real objections – because they represent genuine constraints that require structural solutions","Emotional objections – because price drops don't solve them","Habit objections – because they are deeply ingrained","All are equally difficult"],ans:0}],
  takeaways:["An objection is NOT rejection – it is a request for more information, confidence, or reassurance.","Learn to identify which of the 3 types of objection you are dealing with BEFORE you respond. The response is completely different.","Listen first, always. The real objection is almost always hidden behind the stated one.","The customer who objects loudly is almost always closer to buying than the customer who says nothing."]},

  {day:"TUE",short:"LAER Technique",title:"The LAER Technique – A System for Handling Any Objection",
  speech:_SP["_S12"],
  theory:_TH["_T12"],
  activity:{title:"LAER Written Practice + Verbal Delivery",instructions:"For each objection below, write out your full LAER response at each of the 4 steps. Then pair up and practice delivering it verbally. Switch partners after 2 objections.",
  tasks:["Objection 1: 'The price is R20,000 more than I expected.' Write all 4 LAER steps.","Objection 2: 'I saw this exact vehicle for less on AutoTrader.' Write all 4 LAER steps.","Objection 3: 'I've had bad experiences with car dealerships before.' Write all 4 LAER steps.","Objection 4: 'I need to talk to my financial advisor first.' Write all 4 LAER steps.","Pair up and deliver your written responses verbally. Partner scores: Did you use 'but'? (If yes: -2pts). Did you explore before responding? (If no: -3pts). Was the response specific to the concern revealed? (If no: -3pts)","Compare written responses with your partner. Where do you disagree? That's where the most useful learning is."]},
  quiz:[
  {q:"What does the 'E' in LAER stand for, and why is it the most important step?",opts:["Evaluate – to judge the seriousness of the objection","Explore – because asking a question reveals the real objection hidden behind the stated one, making your response surgical instead of generic","Explain – to give the customer more information about the vehicle","Empathise – to show you genuinely care"],ans:1},
  {q:"Why should you NEVER use the word 'but' after acknowledging a concern?",opts:["It sounds too casual and unprofessional","'But' psychologically erases everything you said before it – it signals that your acknowledgment was performative, not genuine","It is grammatically incorrect in Afrikaans","Customers don't like formal language"],ans:1},
  {q:"The LAER process is most valuable because:",opts:["It makes customers feel a sense of urgency to respond","It is a repeatable, reliable system that works for any objection – not just the ones you've prepared for","It is very quick and saves time in the sales process","It lets you skip steps when you already know the answer"],ans:1},
  {q:"A customer says 'it's too expensive' and you immediately launch into explaining the value. Which step did you skip?",opts:["Listen","Acknowledge","Explore – you don't yet know if 'expensive' means total price, monthly payment, or deposit","Respond"],ans:2}],
  takeaways:["LAER is a system. Use it every time. Don't skip steps because you think you already know the answer – you don't yet.","The Explore step is what separates good salespeople from great ones. It reveals the real objection, making your response precise.","Never use the word 'but' after acknowledging. Replace it with 'and' or 'at the same time' and feel the difference.","Practice LAER on every objection this week – even low-stakes ones. You are building a reflex, not memorising a script."]},

  {day:"WED",short:"Turn-Over Process",title:"The Turn-Over (TO) – Your Secret Weapon for Stalled Deals",
  speech:_SP["_S13"],
  theory:_TH["_T13"],
  activity:{title:"Full TO Simulation – 3 Rounds",instructions:"Run 3 full TO simulations. The salesman briefs the manager, the manager runs the TO, and the customer role is played by a team member. Every person experiences both the briefing role and the manager role.",
  tasks:["Scenario 1: Customer agrees on everything but says 'I want to wait until end of month to see if my bonus comes through.' Salesman briefs manager in under 60 seconds. Manager runs the TO.","Scenario 2: Customer doesn't fully trust the salesman after a rocky start. The manager needs to re-establish confidence and then close.","Scenario 3: Customer wants R15,000 off the price. Manager has authority to offer R8,000 off plus a free service plan. Run the TO with this as the resolution.","Scoring criteria: Briefing scored on: specific? under 60 seconds? hot button included? suggested close stated? (5pts each). TO scored on: rapport rebuilt? specific sticking point addressed? close attempted? (10pts each).","Debrief: Did the briefing give the manager what they needed? Did the TO feel natural? What would make it better?"]},
  quiz:[
  {q:"A TO is most appropriate when:",opts:["Every deal should automatically involve a manager","The deal has stalled after multiple close attempts and a fresh voice may break the specific hesitation that has built up","The customer explicitly asks to speak to a manager","The salesman doesn't know the answer to a technical question"],ans:1},
  {q:"The briefing before the TO must include:",opts:["A full summary of the entire sale from beginning to end","The vehicle, the specific sticking point, the customer's emotional hot button, and the suggested close – all in under 60 seconds","Just the customer's name and the vehicle being considered","The customer's full credit score and financial details"],ans:1},
  {q:"During the TO itself, the original salesman should:",opts:["Leave the room to give the manager space and privacy","Stay present, take notes quietly, remain supportive but completely silent","Jump in and assist when the manager needs support","Offer refreshments and step away from the conversation"],ans:1},
  {q:"A TO closes approximately what percentage of stalled deals?",opts:["5-10%","Over 30%","About 15-20%","About 50%"],ans:1}],
  takeaways:["A TO is a strategic tool, not a failure. Using it at the right moment is one of the smartest moves a salesman can make.","Brief your manager in under 60 seconds: sticking point, hot button, suggested close. Anything more is too much.","Stay in the room during the TO. Your presence reinforces that the team works together for the customer.","After a successful TO, re-engage warmly: 'I'm so glad we could make that work for you today.'"]},

  {day:"THU",short:"Creating Urgency",title:"Creating Genuine Urgency – The Ethical Way to Accelerate Decisions",
  speech:_SP["_S14"],
  theory:_TH["_T14"],
  activity:{title:"Real Urgency Brainstorm – Your Current Stock",instructions:"As a team, look at your actual current stock list and identify 10 GENUINE urgency statements. Manager reviews each one – only real and verifiable ones are approved.",
  tasks:["Look at the stock list NOW: are there any vehicles that are truly one-of-a-kind in condition, colour, mileage, or service history? Write the urgency statement.","Which vehicles have been on the lot for over 45 days? Price reductions may be coming – that's genuine urgency.","What is the current finance rate environment? Is there a reason to lock in a rate this week?","Are there any end-of-month targets that unlock special manager-authorised pricing this week?","Write your 10 approved urgency statements. Practice delivering each one with genuine confidence – because it IS true. Rehearse until it sounds natural, not scripted.","BONUS: Write the exact WhatsApp message you would send within 2 hours to a customer who left without buying today. Make it specific to a real urgency you have."]},
  quiz:[
  {q:"Why is fake urgency particularly dangerous in Louis Trichardt?",opts:["It's legally prohibited","It's unethical, and in a connected community where people talk, one discovered lie permanently damages your reputation and referral network","It simply doesn't work on experienced buyers","All customers can immediately detect fake urgency"],ans:1},
  {q:"Which of these is an example of REAL urgency?",opts:["'This offer expires at midnight tonight'","'I have 10 people calling about this vehicle right now'","'This is a one-owner vehicle with complete service history – when it's gone, these don't come up again for months'","'The price goes up tomorrow if you don't decide today'"],ans:2},
  {q:"After a customer leaves without buying, the best time to call them back is:",opts:["The next morning when they've had a full night to think","Within 2 hours – while the emotional connection to the vehicle is still strong and fresh","48 hours later to give them adequate space","At the end of the week for a soft follow-up"],ans:1},
  {q:"The urgency language formula requires you to:",opts:["State the urgency as forcefully as possible to create maximum pressure","State the urgency specifically, acknowledge their autonomy, connect to their interest, give them the decision","State the urgency three times in different ways","Apologise for the urgency before stating it"],ans:1}],
  takeaways:["Real urgency is powerful and ethical. Fake urgency is a reputation killer – especially in a small, connected community.","Know your stock. Know what is genuinely scarce, genuinely time-sensitive, genuinely special right now.","The callback within 2 hours of a customer leaving without buying is one of the highest-converting activities in car sales. Do it every time.","Urgency used with compassion and honesty builds trust rather than eroding it."]},

  {day:"FRI",short:"Role Play Battle",title:"Week 3 Role Play Battle – Competitive, Scored, Live",
  speech:_SP["_S15"],
  theory:_TH["_T15"],
  activity:{title:"Battle Prep – 15 Minutes Individual Preparation",instructions:"Before the competition, each salesman has 15 minutes to write their responses to all 7 objections in full. This preparation document can be reviewed after the battle to compare written preparation vs live performance.",
  tasks:["Write your complete LAER response to all 7 objections from the pool. Full sentences. All 4 steps visible.","Speak each response OUT LOUD at least twice during the 15 minutes. Volume matters.","Identify your strongest 2 closes. Know in advance which close you will attempt after each objection.","Review your Week 1 assessment score. What was your weakest area? That is where you focus the most preparation time.","After the battle: honestly score yourself. Where did you freeze? Where were you smooth and natural? What will you drill next week before the next practice?"]},
  quiz:[
  {q:"In the role play battle scoring, attempting a close after handling an objection is worth:",opts:["5 points out of 10","1 point out of 10","2 points out of 10 – closes are important but the objection handling carries more weight","It's not scored – only the objection handling is evaluated"],ans:2},
  {q:"The competitive role play format is valuable because:",opts:["It embarrasses underperformers publicly","It creates healthy competition that motivates improvement","It simulates real-time pressure – the same pressure that exists with a real customer – making reflexive responses permanent","It determines who keeps their job"],ans:2},
  {q:"After each round, the manager gives:",opts:["A full performance review covering every aspect of the interaction","One specific positive and one specific improvement only – focused, actionable, brief","Only a numerical score with no verbal feedback","No feedback until all rounds are complete and the winner is announced"],ans:1},
  {q:"Why does the winner earn first pick of leads next week?",opts:["It's a financial reward equivalent to the prize money","It creates a direct link between demonstrating skill and earning better business opportunities – better skills earn better leads","It's standard industry practice at Toyota","To motivate the others by showing what they're missing"],ans:1}],
  takeaways:["Role play under observation and competitive pressure is the fastest way to make objection handling truly reflexive.","The 15-minute written preparation before the battle directly improves live performance. Never skip it.","First-time discomfort in role play becomes permanent confidence on the floor. Lean into the difficulty.","Keep your battle preparation sheet. It is your personal objection handling reference for every live sales interaction this month."]}
  ]},

  {week:"Week 4",theme:"Digital, Referrals & Long-Term Success",color:"#6A0DAD",days:[
  {day:"MON",short:"Personal Brand Online",title:"Building Your Personal Brand Online – Your 500 Free Salespeople",
  speech:_SP["_S16"],
  theory:_TH["_T16"],
  activity:{title:"Personal Brand Audit + First Vehicle Video",instructions:"Each salesman completes the audit, then creates and actually posts their first branded vehicle video during this training session.",
  tasks:["AUDIT: Count your WhatsApp contacts. Count your Facebook friends. When did you last post anything vehicle-related? Write your honest answers.","CONTENT PLAN: Write what you will post, on which platform, for the next 7 days. Minimum: 1 WhatsApp status daily + 1 Facebook post this week.","VEHICLE VIDEO – RIGHT NOW: Pick a vehicle on the lot. Record a 60-second walkaround with your voice. 'Good morning, I'm [Name] from NTT Toyota Louis Trichardt. Look at this one that just came in...' Post it to your WhatsApp status during this session.","CAPTION FORMULA: '[Year] [Make] [Model] | [Mileage]km | R[Price] | [One benefit statement] | Interested? WhatsApp me directly at [number].'","Team review: watch each other's videos. Two positive observations + one improvement each. What made people want to watch to the end?"]},
  quiz:[
  {q:"Which platform should be your daily content priority in Louis Trichardt?",opts:["TikTok – for the biggest reach","Instagram – for the best visual content","WhatsApp Status – it reaches your existing trusted contacts directly and personally every single day","LinkedIn – for professional credibility"],ans:2},
  {q:"Your personal brand content should be split approximately:",opts:["100% vehicles – that's what you're selling","60% vehicles, 30% education, 10% personality and trust","50% vehicles, 50% personal life content","Equal split across all content types"],ans:1},
  {q:"Why post with your face and voice rather than just vehicle photos?",opts:["It gets significantly more likes and engagement","People buy from people they know and trust – a face video is a personal recommendation, not just an advertisement","Toyota requires video content from all dealership staff","It is easier and faster to produce than written posts"],ans:1},
  {q:"The ideal response time to a social media enquiry about a vehicle is:",opts:["Within 24 business hours","Within 2 hours during business hours","As fast as possible – ideally within 30 minutes. Speed of response is directly correlated to whether you get the sale or lose it to someone faster","Next business day is acceptable for evening enquiries"],ans:2}],
  takeaways:["Post every day. Consistency matters more than perfection. A slightly imperfect video posted beats a perfect video never made.","Always include your face and voice. People buy from people. A faceless photo is an advert. Your face is a relationship.","Speed of response to social enquiries is one of the highest-impact habits you can build. 30 minutes or less, always.","Track what works. A post that gets 10 enquiries vs one that gets zero tells you exactly what your specific audience responds to."]},

  {day:"TUE",short:"Referral Machine",title:"The Referral Machine – Your Most Profitable and Most Neglected Tool",
  speech:_SP["_S17"],
  theory:_TH["_T17"],
  activity:{title:"Referral Script Practice + Tracker Setup",instructions:"Each salesman practices the handover referral ask and sets up their personal referral tracker for the rest of this month.",
  tasks:["Practice the handover referral ask in pairs. First person delivers it naturally. Second person plays a happy customer. Switch. Does it sound natural or scripted? Score each other out of 5 for naturalness.","Set up your personal referral tracker TODAY. Create it in a notebook, phone notes app, or spreadsheet – right now during this session.","Go through your sales from the last 3 months: who did you sell to that you haven't specifically asked for a referral? Write a WhatsApp message to at least 3 of them today and send it before you leave tonight.","Calculate: if you earn 1 referral per 3 sales, and referrals close at 3x the rate – how many extra units per month does that represent for you? Write the number.","Team discussion: what referral reward can you offer? What does your manager have budget to approve? Agree on a standard reward and commit to it."]},
  quiz:[
  {q:"At what moment in the sale should you make the referral ask?",opts:["During the needs analysis when rapport is highest","Before the test drive when they are most excited","At vehicle handover, when the customer is in their new vehicle and smiling – not before","During the price negotiation to soften the atmosphere"],ans:2},
  {q:"Why do referred customers close at 3 times the rate of cold leads?",opts:["They are typically wealthier buyers","They are more serious and further along in the buying process","They already trust you because someone they trust has personally endorsed you","They have researched more thoroughly online"],ans:2},
  {q:"The 2-week follow-up call serves which TWO primary purposes?",opts:["Just a politeness call with no sales objective","Only to ask for referrals while the relationship is warm","To show genuine care and catch any concerns early AND to ask for referrals – both in one natural call","Only to check for vehicle problems"],ans:2},
  {q:"When a referral results in a sale, you should reward the referring customer:",opts:["At your next convenient time during business hours","Personally and immediately – the speed and personalisation of the reward reinforces the behaviour and generates more referrals","With a standard voucher mailed to them within 2 weeks","At the end of the month with a batch of referral rewards"],ans:1}],
  takeaways:["The referral ask at handover is the single highest-ROI activity in car sales. Do it every time without exception.","Speed and personalisation of referral rewards drives repeat referral behaviour more than the monetary value does.","Your referral tracker is a live pipeline of warm leads. Check it every Monday and follow up on every open referral.","A business built on referrals is the most sustainable, lowest-cost, highest-trust business model in sales."]},

  weekly:{units:2,apps:7,trades:1,gp:112500,rpu:50000,conv:10},
  monthly:{units:9,apps:25,trades:4,gp:450000,rpu:50000,conv:10}

function scFmtR(n){
  n=Number(n)||0;
  if(n>=1000000)return"R"+(n/1000000).toFixed(2)+"M";
  if(n>=1000)return"R"+Math.round(n/1000)+"k";
  return"R"+Math.round(n);
}
const ScorecardPanel=memo(function({person,myLeads,pName}){
  const [view,setView]=useState("weekly");
  const [advice,setAdvice]=useState("");
  const [advLoad,setAdvLoad]=useState(false);
  const [pDataSC,setPDataSC]=useState(()=>{try{const d=localStorage.getItem("ntt_graphs_p");return d?JSON.parse(d):{};}catch(e){return{};}});
  useEffect(()=>{
    function sync(){try{const d=localStorage.getItem("ntt_graphs_p");if(d)setPDataSC(JSON.parse(d));}catch(e){}}
    sync();const iv=setInterval(sync,5000);return ()=>clearInterval(iv);
  },[]);

  const curWk=getCurWeek();
  const weeks=person.weeks||[{},{},{},{}];
  const wk=weeks[curWk]||{};
  const MO_SC=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const curMo=MO_SC[new Date().getMonth()];
  const curYr=new Date().getFullYear();

  const pKeyUC=(pName||"").toUpperCase();
  const pKeyFound=Object.keys(pDataSC).find(k=>k.toUpperCase()===pKeyUC||k.toUpperCase()===pKeyUC.split(" ")[0])||pName;
  const pRow=pDataSC[pKeyFound]||{};
  const gpMo=Number((pRow.gp||{})[curMo])||0;
  const rpuMo=Number((pRow.rpu||{})[curMo])||0;

  const moUnits=weeks.reduce((a,w)=>a+(w.sales||0),0);
  const moApps=weeks.reduce((a,w)=>a+(w.applications||0),0);
  const moTrades=weeks.reduce((a,w)=>a+(w.tradeIns||0),0);
  const totalLeads=(myLeads||[]).length;
  const deliveredLeads=(myLeads||[]).filter(l=>l.leadStatus==="delivered").length;
  const convPct=totalLeads>0?Math.round((deliveredLeads/totalLeads)*100):0;

  const isWk=view==="weekly";
  const tgt=isWk?SC_TARGETS.weekly:SC_TARGETS.monthly;

  const metrics=[
    {key:"units",label:"Units Sold",icon:"🚗",actual:isWk?wk.sales||0:moUnits,target:tgt.units,fmt:n=>""+n,isR:false},
    {key:"apps",label:"Applications",icon:"📋",actual:isWk?wk.applications||0:moApps,target:tgt.apps,fmt:n=>""+n,isR:false},
    {key:"trades",label:"Trade-Ins",icon:"🔄",actual:isWk?wk.tradeIns||0:moTrades,target:tgt.trades,fmt:n=>""+n,isR:false},
    {key:"conv",label:"Lead Conversion",icon:"🎯",actual:convPct,target:tgt.conv,fmt:n=>n+"%",isR:false,sub:"Target: 1 in 10"},
    {key:"gp",label:"Gross Profit",icon:"💰",actual:gpMo,target:tgt.gp,fmt:scFmtR,isR:true},
    {key:"rpu",label:"Rand Per Unit",icon:"📊",actual:rpuMo,target:tgt.rpu,fmt:scFmtR,isR:true}
  ];

  function getPct(a,t){return t?Math.min(Math.round((a/t)*100),999):0;}
  function getCol(p){return p>=100?"#1E8449":p>=70?"#F57F17":"#C0392B";}
  function getIco(p){return p>=100?"✅":p>=70?"⚠️":"❌";}

  const avgPct=Math.round(metrics.reduce((a,m)=>a+Math.min(getPct(m.actual,m.target),100),0)/metrics.length);
  const grade=avgPct>=90?{g:"A",c:"#1E8449",msg:"Excellent — keep it up!"}:
    avgPct>=75?{g:"B",c:"#2E86AB",msg:"Good — push harder on the gaps."}:
    avgPct>=60?{g:"C",c:"#F57F17",msg:"Average — focused effort needed."}:
    avgPct>=40?{g:"D",c:"#E67E22",msg:"Below expectations — urgent action."}:
    {g:"F",c:"#C0392B",msg:"Critical — speak to your manager."};

  function genAdvice(){
    setAdvLoad(true);setAdvice("");
    const period=isWk?"Week "+(curWk+1)+" of 4 ("+curMo+")":"Full month of "+curMo;
    const lines=metrics.map(m=>{
      const p=getPct(m.actual,m.target);
      return"- "+m.label+": "+m.fmt(m.actual)+" vs target "+m.fmt(m.target)+" ("+Math.min(p,100)+"%) — "+(p>=100?"ON TARGET":p>=70?"BEHIND":"WELL BEHIND");
    }).join("\n");
    const firstName=pName.split(" ")[0];
    const prompt="You are a tough but fair used car sales coach at NTT Toyota Louis Trichardt AUTOMARK in South Africa. Give personalised, direct coaching advice to "+pName+" for "+period+".\n\nPERFORMANCE:\n"+lines+"\nGrade: "+grade.g+" ("+avgPct+"%)\n\nWrite 3-4 short paragraphs. Be specific and direct. Reference actual numbers. Focus on biggest gaps first. End with one motivational sentence. Under 200 words. Address them as "+firstName+". Flowing paragraphs only.";
    fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:400,messages:[{role:"user",content:prompt}]})
    }).then(r=>r.json()).then(data=>{
      setAdvice((data.content&&data.content[0]&&data.content[0].text)||"Could not generate. Try again.");
    }).catch(()=>setAdvice("Connection error. Try again.")).finally(()=>setAdvLoad(false));
  }

  function doPrint(){
    const rows=metrics.map(m=>{
      const p=getPct(m.actual,m.target);
      const cls=p>=100?"gn":p>=70?"am":"rd";
      const st=p>=100?"On Target":p>=70?"Behind":"Well Behind";
      return "<tr><td>"+m.icon+" "+m.label+(m.sub?" <em>("+m.sub+")</em>":"")+"</td><td>"+m.fmt(m.actual)+"</td><td>"+m.fmt(m.target)+"</td><td class='"+cls+"'>"+Math.min(p,100)+"%</td><td class='"+cls+"'>"+st+"</td></tr>";
    }).join("");
    const advHtml=advice?"<h3 style='font-size:13px;margin:14px 0 6px'>AI Coaching Advice</h3><div style='background:#f9f9f9;border-left:4px solid #1A6FAD;padding:12px;font-size:12px;line-height:1.7'>"+advice.replace(/\n\n/g,"<br/><br/>")+"</div>":"";
    const gcss="color:"+grade.c+";border:3px solid "+grade.c;
    const html=[
      "<!DOCTYPE html><html><head><meta charset='UTF-8'/>",
      "<style>body{font-family:Arial,sans-serif;padding:20px;max-width:680px;margin:0 auto}",
      "h1{font-size:18px;margin:0 0 2px}.sub{color:#888;font-size:12px;margin:0 0 14px}",
      "table{width:100%;border-collapse:collapse}th{background:#1A6FAD;color:#fff;padding:8px;text-align:left;font-size:11px}",
      "td{padding:8px;border-bottom:1px solid #eee;font-size:12px}",
      ".gn{color:#1E8449;font-weight:700}.am{color:#F57F17;font-weight:700}.rd{color:#C0392B;font-weight:700}",
      ".gb{display:inline-flex;align-items:center;justify-content:center;width:52px;height:52px;border-radius:26px;font-size:26px;font-weight:900;"+gcss+"}",
      ".foot{margin-top:16px;font-size:10px;color:#aaa;border-top:1px solid #eee;padding-top:6px}</style></head><body>",
      "<h1>"+pName+"</h1>",
      "<p class='sub'>Performance Report &bull; "+(isWk?"Week "+(curWk+1)+" of 4":curMo+" "+curYr+" Month Total")+"</p>",
      "<div class='gb'>"+grade.g+"</div>&nbsp;<span style='font-size:13px;color:"+grade.c+"'>"+grade.msg+"</span><br/><br/>",
      "<table><tr><th>Metric</th><th>Actual</th><th>Target</th><th>%</th><th>Status</th></tr>"+rows+"</table>",
      advHtml,
      "<div class='foot'>Printed "+new Date().toLocaleString("en-ZA")+" &bull; NTT Toyota Louis Trichardt AUTOMARK</div>",
      "</body></html>"
    ].join("");
    const w=window.open("","_blank");
    w.document.write(html);
    w.document.close();
    setTimeout(()=>w.print(),500);
  }

  return(
    <div className="fade">
      <div style={{background:"linear-gradient(135deg,#1A6FAD,#0d4a7a)",borderRadius:12,padding:"14px 16px",marginBottom:14,color:"#fff"}}>
        <div style={{fontSize:16,fontWeight:900}}>🏆 My Performance</div>
        <div style={{fontSize:12,opacity:.75,marginTop:2}}>{curMo} {curYr} · NTT Toyota Louis Trichardt</div>
      </div>

      <div style={{display:"flex",gap:8,marginBottom:14}}>
        {["weekly","monthly"].map(k=>(
          <button key={k} onClick={()=>{setView(k);setAdvice("");}} style={{flex:1,padding:10,borderRadius:9,border:"2px solid "+(view===k?"#1A6FAD":"#e0e0e0"),background:view===k?"#1A6FAD":"#fff",color:view===k?"#fff":"#555",fontWeight:700,fontSize:13,cursor:"pointer"}}>
            {k==="weekly"?"📅 This Week":"📆 This Month"}
          </button>
        ))}
      </div>

      <div style={{background:grade.c+"15",border:"2px solid "+grade.c+"40",borderRadius:12,padding:"14px 16px",marginBottom:14,display:"flex",alignItems:"center",gap:14}}>
        <div style={{width:56,height:56,borderRadius:28,background:grade.c,display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,fontWeight:900,color:"#fff",flexShrink:0}}>{grade.g}</div>
        <div>
          <div style={{fontWeight:800,fontSize:15,color:grade.c}}>{grade.msg}</div>
          <div style={{fontSize:12,color:"#888",marginTop:2}}>{isWk?"Week "+(curWk+1)+" of 4":curMo+" Month"} · {avgPct}% overall</div>
        </div>
      </div>

      <div style={{display:"grid",gap:8,marginBottom:14}}>
        {metrics.map(m=>{
          const p=getPct(m.actual,m.target);const c=getCol(p);const bw=Math.min(p,100);
          const behindAmt=m.isR?scFmtR(Math.max(m.target-m.actual,0)):(Math.max(m.target-m.actual,0))+(m.key==="conv"?"%":"");
          return(
            <div key={m.key} style={{background:"#fff",borderRadius:10,border:"1px solid #f0f0f0",padding:"12px 14px",boxShadow:"0 1px 3px rgba(0,0,0,.04)"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                <div>
                  <div style={{fontWeight:700,fontSize:13}}>{m.icon} {m.label}</div>
                  {m.sub&&<div style={{fontSize:10,color:"#aaa",marginTop:1}}>{m.sub}</div>}
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:11,color:"#aaa"}}>Target: {m.fmt(m.target)}</div>
                  <div style={{fontSize:18,fontWeight:900,color:c}}>{m.fmt(m.actual)}</div>
                </div>
              </div>
              <div style={{background:"#f0f0f0",borderRadius:99,height:8,overflow:"hidden",marginBottom:4}}>
                <div style={{width:bw+"%",height:"100%",background:c,borderRadius:99}}/>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:11}}>
                <span style={{color:c,fontWeight:700}}>{getIco(p)} {bw}% of target</span>
                {p>=100?<span style={{color:"#1E8449",fontWeight:700}}>On Target! 🎉</span>
                :<span style={{color:c}}>{behindAmt} behind</span>}
              </div>
            </div>
          );
        })}
      </div>

      <div style={{background:"#f8f9fa",borderRadius:12,border:"1px solid #e0e0e0",padding:"14px 16px",marginBottom:12}}>
        <div style={{fontWeight:700,fontSize:14,marginBottom:8}}>🤖 AI Coaching Advice</div>
        {!advice&&!advLoad&&(
          <div>
            <div style={{fontSize:12,color:"#888",marginBottom:10}}>Get personalised coaching based on your numbers vs targets.</div>
            <button onClick={genAdvice} style={{width:"100%",padding:11,borderRadius:9,border:"none",background:"#1A6FAD",color:"#fff",fontWeight:700,fontSize:14,cursor:"pointer"}}>Generate My Coaching Advice</button>
          </div>
        )}
        {advLoad&&<div style={{textAlign:"center",padding:"16px 0",color:"#888"}}><div style={{fontSize:22,marginBottom:6}}>⏳</div><div style={{fontSize:13}}>Analysing your performance...</div></div>}
        {advice&&(
          <div>
            <div style={{fontSize:13,color:"#333",lineHeight:1.7,whiteSpace:"pre-wrap"}}>{advice}</div>
            <button onClick={genAdvice} style={{marginTop:10,padding:"7px 14px",borderRadius:8,border:"1px solid #ddd",background:"#fff",cursor:"pointer",fontSize:12,color:"#555"}}>Regenerate</button>
          </div>
        )}
      </div>

      <button onClick={doPrint} style={{width:"100%",padding:12,borderRadius:9,border:"1px solid #1A6FAD",background:"#fff",color:"#1A6FAD",fontWeight:700,fontSize:14,cursor:"pointer"}}>
        🖨️ Print Performance Report
      </button>
    </div>
  );
});

const GraphsPanel=memo(({pColor,pName})=>{
  const MO=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const METRICS=[
    {key:"units",label:"Units Sold",color:"#1A6FAD",prefix:""},
    {key:"gp",label:"Gross Profit",color:"#1E8449",prefix:"R"},
    {key:"rpu",label:"Rand Per Unit",color:"#6A0DAD",prefix:"R"},
    {key:"leads",label:"Leads Closed",color:"#C9A84C",prefix:""},
  ];
  const [active,setActive]=useState("units");
  const [teamData]=useState(function(){try{var d=localStorage.getItem("ntt_graphs");return d?JSON.parse(d):{};}catch(e){return{};}});
  const [pData,setPData]=useState(function(){try{var d=localStorage.getItem("ntt_graphs_p");return d?JSON.parse(d):{};}catch(e){return{};}});
  useEffect(function(){function syncP(){try{var d=localStorage.getItem("ntt_graphs_p");if(d)setPData(JSON.parse(d));}catch(e){}};syncP();var iv=setInterval(syncP,5000);return function(){clearInterval(iv);};},[]);
  const metric=METRICS.find(function(m){return m.key===active;})||METRICS[0];
  const col=metric.color;const pre=metric.prefix;
  const tVals=MO.map(function(m){var _v=(teamData[active]||{})[m];return!_v&&_v!==0?0:parseFloat(typeof _v==="string"?_v.replace(/[^0-9.]/g,""):_v)||0;});
  const pKey=(function(){var n=(pName||"").toUpperCase();var n1=n.split(" ")[0];var keys=Object.keys(pData);return keys.find(function(k){return k.toUpperCase()===n;})||keys.find(function(k){return k.toUpperCase()===n1;})||keys.find(function(k){return n.startsWith(k.toUpperCase());})||pName;})();const myRaw=((pData[pKey]||{})[active])||{};
  const myVals=MO.map(function(m){var v=myRaw[m];return!v&&v!==0?0:parseFloat(typeof v==="string"?v.replace(/[^0-9.]/g,""):v)||0;});
  const fmtV=function(v){return v>=1000000?(v/1000000).toFixed(1)+"m":v>=1000?Math.round(v/1000)+"k":String(v);};
  const sumV=function(a){return a.reduce(function(s,v){return s+v;},0);};
  const avgV=function(a){var nz=a.filter(function(v){return v>0;});return nz.length?Math.round(sumV(nz)/nz.length):0;};
  const hasMyData=myVals.some(function(v){return v>0;});
  const myGPVals=MO.map(function(m){var v=((pData[pKey]||{})["gp"]||{})[m];return!v&&v!==0?0:parseFloat(typeof v==="string"?v.replace(/[^0-9.]/g,""):v)||0;});
  const myUVals=MO.map(function(m){var _sv=((pData[pKey]||{})["units"]||{})[m];return!_sv&&_sv!==0?0:parseFloat(typeof _sv==="string"?_sv.replace(/[^0-9.]/g,""):_sv)||0;});
  const tGPVals=MO.map(function(m){var _sv=(teamData["gp"]||{})[m];return!_sv&&_sv!==0?0:parseFloat(typeof _sv==="string"?_sv.replace(/[^0-9.]/g,""):_sv)||0;});
  const tUVals=MO.map(function(m){var _sv=(teamData["units"]||{})[m];return!_sv&&_sv!==0?0:parseFloat(typeof _sv==="string"?_sv.replace(/[^0-9.]/g,""):_sv)||0;});
  const renderBars=function(vals,c,h){
    var mx=Math.max.apply(null,vals.concat([1]));
    return vals.map(function(v,i){
      return <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"flex-end",height:"100%"}}>
        <div style={{fontSize:8,color:"#555",marginBottom:1,textAlign:"center",fontWeight:600}}>{v>0?(pre+fmtV(v)):""}</div>
        <div style={{width:"80%",background:v===Math.max.apply(null,vals)&&v>0?c:c+"88",borderRadius:"3px 3px 0 0",height:v>0?Math.max(3,(v/mx)*h)+"px":"0px"}}/>
        <div style={{fontSize:7,color:"#bbb",marginTop:2}}>{MO[i][0]}</div>
      </div>;
    });
  };
  const renderStats=function(vals,c,gpV,uV){
    if(active==="rpu"&&gpV&&uV){var tGP=sumV(gpV);var tU=sumV(uV);var trueAvg=tU>0?Math.round(tGP/tU):0;return <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginTop:10}}><div style={{background:c+"18",borderRadius:8,padding:"7px",textAlign:"center"}}><div style={{fontSize:9,color:"#888"}}>True Avg GP/Unit</div><div style={{fontSize:13,fontWeight:800,color:c}}>R{trueAvg.toLocaleString()}</div></div><div style={{background:c+"18",borderRadius:8,padding:"7px",textAlign:"center"}}><div style={{fontSize:9,color:"#888"}}>Best Month</div><div style={{fontSize:13,fontWeight:800,color:c}}>R{Math.max.apply(null,vals.concat([0])).toLocaleString()}</div></div></div>;}
    return <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginTop:10}}>
      <div style={{background:c+"18",borderRadius:8,padding:"7px",textAlign:"center"}}><div style={{fontSize:9,color:"#888"}}>Total</div><div style={{fontSize:13,fontWeight:800,color:c}}>{pre}{sumV(vals).toLocaleString()}</div></div>
      <div style={{background:c+"18",borderRadius:8,padding:"7px",textAlign:"center"}}><div style={{fontSize:9,color:"#888"}}>Avg/Mo</div><div style={{fontSize:13,fontWeight:800,color:c}}>{pre}{avgV(vals).toLocaleString()}</div></div>
      <div style={{background:c+"18",borderRadius:8,padding:"7px",textAlign:"center"}}><div style={{fontSize:9,color:"#888"}}>Best</div><div style={{fontSize:13,fontWeight:800,color:c}}>{pre}{Math.max.apply(null,vals.concat([0])).toLocaleString()}</div></div>
    </div>;
  };
  return(
    <div className="fade">
      <div style={{background:"linear-gradient(135deg,#1A6FAD,#0e4d8c)",borderRadius:12,padding:"12px 14px",marginBottom:10,color:"#fff"}}>
        <div style={{fontSize:15,fontWeight:700}}>📈 Graphs</div>
        <div style={{fontSize:10,opacity:.7}}>Manager enters data · View only</div>
      </div>
      <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}}>
        {METRICS.map(function(m){return(
          <button key={m.key} onClick={function(){setActive(m.key);}} style={{padding:"6px 12px",borderRadius:20,border:active===m.key?"none":"1px solid #eee",background:active===m.key?m.color:"#fff",color:active===m.key?"#fff":"#555",cursor:"pointer",fontSize:11,fontWeight:active===m.key?700:400}}>
            {m.label}
          </button>
        );})}
      </div>
      <Card title={"⭐ My Personal — "+metric.label}>
        {hasMyData?(
          <div>
            <div style={{display:"flex",alignItems:"flex-end",gap:2,height:106,borderBottom:"2px solid #eee",paddingBottom:2}}>
              {renderBars(myVals,pColor||"#C9A84C",90)}
            </div>
            {renderStats(myVals,pColor||"#C9A84C",myGPVals,myUVals)}
          </div>
        ):(
          <div style={{textAlign:"center",padding:"20px",color:"#aaa",fontSize:12,background:"#fafafa",borderRadius:8}}>
            No personal data yet. Your manager will add your figures.
          </div>
        )}
      </Card>
      <Card title={"Team — "+metric.label}>
        <div style={{display:"flex",alignItems:"flex-end",gap:2,height:106,borderBottom:"2px solid #eee",paddingBottom:2}}>
          {renderBars(tVals,col,90)}
        </div>
        {renderStats(tVals,col,tGPVals,tUVals)}
      </Card>
    </div>
  );
});

// ── TODO PANEL ────────────────────────────────────────────────────────────────
const TodoPanel=memo(({pName,pColor})=>{
  const [items,setItems]=useState(()=>loadTodo().filter(x=>x.cat===pName));
  const [text,setText]=useState("");
  const refresh=()=>setItems(loadTodo().filter(x=>x.cat===pName));
  const add=()=>{
    if(!text.trim())return;
    const all=loadTodo();
    saveTodo([{id:Date.now(),text:text.trim(),cat:pName,done:false,ts:new Date().toLocaleDateString("en-ZA")},...all]);
    setText("");refresh();
  };
  const tog=(id)=>{const all=loadTodo();saveTodo(all.map(x=>x.id===id?{...x,done:!x.done}:x));refresh();};
  const del=(id)=>{if(window.confirm("Delete this task?")){saveTodo(loadTodo().filter(x=>x.id!==id));refresh();}};
  const pending=items.filter(x=>!x.done);const done=items.filter(x=>x.done);
  return(
    <div className="fade">
      <div style={{background:"linear-gradient(135deg,#C9A84C,#a8872e)",borderRadius:12,padding:"12px 14px",marginBottom:10,color:"#fff"}}>
        <div style={{fontSize:15,fontWeight:700}}>📝 My To Do List</div>
        <div style={{fontSize:10,opacity:.7}}>Your tasks · visible to manager</div>
      </div>
      <div style={{background:"#fff",borderRadius:10,border:"1px solid #eee",padding:"12px",marginBottom:10}}>
        <textarea value={text} onChange={e=>setText(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&e.ctrlKey)add();}} placeholder="Type a task... (Ctrl+Enter to save)" rows={3} style={{width:"100%",padding:"8px",borderRadius:7,border:"1px solid #ddd",fontSize:12,outline:"none",fontFamily:"inherit",resize:"vertical",boxSizing:"border-box",marginBottom:8}}/>
        <button onClick={add} style={{width:"100%",padding:"9px",borderRadius:7,border:"none",background:pColor,color:"#fff",cursor:"pointer",fontSize:13,fontWeight:700}}>+ Add Task</button>
      </div>
      {pending.length===0&&done.length===0&&<Card><div style={{textAlign:"center",padding:"16px",color:"#aaa",fontSize:12}}>No tasks yet.</div></Card>}
      {pending.map(item=>(
        <div key={item.id} style={{background:"#fff",borderRadius:9,border:"1px solid #eee",padding:"10px 12px",marginBottom:7,display:"flex",gap:10,alignItems:"flex-start"}}>
          <input type="checkbox" checked={false} onChange={()=>tog(item.id)} style={{marginTop:3,cursor:"pointer",width:16,height:16,flexShrink:0}}/>
          <div style={{flex:1}}>
            <div style={{fontSize:9,color:"#bbb",marginBottom:2}}>{item.ts}</div>
            <div style={{fontSize:13,lineHeight:1.5,whiteSpace:"pre-wrap"}}>{item.text}</div>
          </div>
          <button onClick={()=>del(item.id)} style={{border:"none",background:"none",color:"#ddd",cursor:"pointer",fontSize:16,padding:0,flexShrink:0}}>✕</button>
        </div>
      ))}
      {done.length>0&&<div style={{fontSize:10,fontWeight:700,color:"#bbb",margin:"10px 0 6px",textTransform:"uppercase",letterSpacing:1}}>Done ({done.length})</div>}
      {done.map(item=>(
        <div key={item.id} style={{background:"#f9f9f9",borderRadius:9,border:"1px solid #f0f0f0",padding:"8px 12px",marginBottom:6,display:"flex",gap:10,alignItems:"flex-start",opacity:.6}}>

const LoginScreen=memo(({onLogin,people,onPeopleLoaded})=>{
  const [localPpl,setLocalPpl]=useState(people.length>0?people:[]);
  const [selName,setSelName]=useState('');
  const [pw,setPw]=useState('');
  const [err,setErr]=useState('');
  const ppl=localPpl.length>0?localPpl:people;
  const names=ppl.filter(p=>!p.isOtherDept);
  useEffect(function(){
    if(names.length===0){
      fetch(FB_PATH).then(function(r){return r.json();}).then(function(d){
        if(d&&d.people&&d.people.length){window._nttPeople=d.people;setLocalPpl(d.people);if(onPeopleLoaded)onPeopleLoaded(d.people);}
        else{setErr('Could not load team. Check internet.');}
      }).catch(function(){setErr('Network error. Check connection.');});
    }
  },[]);
  function doLogin(){
    if(!selName){setErr('Select your name first.');return;}
    if(!pw){setErr('Type your password.');return;}
    var p2=localPpl.length>0?localPpl:(window._nttPeople||people);
    var person=null;
    for(var i=0;i<p2.length;i++){if(p2[i].name===selName){person=p2[i];break;}}
    if(!person||!person.password){setErr('No password set for '+selName+'. Ask manager.');return;}
    if(pw.trim().toLowerCase()===person.password.trim().toLowerCase()){setErr('');onLogin(selName);}
    else{setErr('Wrong password. Try again.');}
  }
  const fS={width:'100%',padding:'16px',borderRadius:10,border:'1px solid #444',background:'#111',color:'#fff',fontSize:18,marginBottom:14,boxSizing:'border-box',fontFamily:'inherit',display:'block'};
  return(
    <div style={{minHeight:'100vh',background:'linear-gradient(160deg,#0a0a0a 60%,#111)',display:'flex',alignItems:'center',justifyContent:'center',padding:20,boxSizing:'border-box'}}>
      <div style={{width:'100%',maxWidth:360}}>
        <div style={{textAlign:'center',marginBottom:24}}>
          <div style={{fontSize:38,marginBottom:6}}>&#127942;</div>
          <div style={{fontSize:10,color:'#C9A84C',fontWeight:700,letterSpacing:3,marginBottom:3}}>NTT TOYOTA LOUIS TRICHARDT</div>
          <div style={{fontSize:26,fontWeight:900,color:'#fff',marginBottom:2}}>AUTOMARK</div>
          <div style={{fontSize:11,color:'#555'}}>Sales Platform</div>
        </div>
        {names.length===0?(
          <div style={{textAlign:'center',color:'#C9A84C',padding:'20px',fontSize:13}}>{err||'Loading team data...'}</div>
        ):(
          <div>
            <div style={{fontSize:12,fontWeight:700,color:'#888',marginBottom:8}}>1. SELECT YOUR NAME</div>
            <select value={selName} onChange={e=>{setSelName(e.target.value);setErr('');}} style={fS}>
              <option value=''>-- Select your name --</option>
              {names.map(p=><option key={p.name} value={p.name}>{p.name}{p.password?' \u2713':''}</option>)}
            </select>
            <div style={{fontSize:12,fontWeight:700,color:'#888',marginBottom:8}}>2. TYPE YOUR PASSWORD</div>
            <input value={pw} onChange={e=>{setPw(e.target.value);setErr('');}} type='password' placeholder='Type your password' autoCapitalize='none' autoCorrect='off' spellCheck='false' style={fS}/>
            {err?<div style={{color:'#ff6b6b',fontSize:14,marginBottom:14,textAlign:'center',fontWeight:700}}>{err}</div>:null}
            <button onClick={doLogin} style={{width:'100%',padding:'20px',borderRadius:11,background:'#C9A84C',color:'#000',fontSize:20,fontWeight:900,border:'none',cursor:'pointer',boxSizing:'border-box',fontFamily:'inherit'}}>ENTER</button>
            <div style={{textAlign:'center',marginTop:14,fontSize:11,color:'#444'}}>Forgot password? Ask your manager.</div>
          </div>
        )}
      </div>
    </div>
  );
});


function SalesmanApp(){
  const [name,setName]=useState(window._nttUser||window._nttLoggedInAs||null);
  const [appData,setAppData]=useState(()=>{var d=loadAppData()||{people:[],soldUnits:[],stock:[],stockDemo:[]};if(!d.stockDemo||!d.stockDemo.length){try{var sd=localStorage.getItem("ntt_sl_demo");if(sd)d.stockDemo=JSON.parse(sd);}catch{}}return d;});
  useEffect(()=>{
    // Firebase: load once then poll
    var loadFb=function(){
      fbPull().then(function(d){
        if(!d)return;
        try{
          var ex=Object.assign({},loadAppData()||{});
          if(d.people&&d.people.length)ex.people=d.people;
          if(d.soldUnits)ex.soldUnits=d.soldUnits;
          if(d.stock)ex.stock=d.stock;
          if(d.stockDemo)ex.stockDemo=d.stockDemo;
          try{localStorage.setItem(SAVE_KEY,JSON.stringify(ex));}catch(e){}
          if(d.todo)try{localStorage.setItem("ntt_todo",JSON.stringify(d.todo));}catch(e){}
          if(d.find)try{localStorage.setItem("ntt_find",JSON.stringify(d.find));}catch(e){}
          if(d.graphs)try{localStorage.setItem("ntt_graphs",JSON.stringify(d.graphs));}catch(e){}
          if(d.graphsP)try{localStorage.setItem("ntt_graphs_p",JSON.stringify(d.graphsP));}catch(e){}
          if(d.stock)try{localStorage.setItem("ntt_sl",JSON.stringify(d.stock));}catch(e){}
          if(d.stockDemo)try{localStorage.setItem("ntt_sl_demo",JSON.stringify(d.stockDemo));}catch(e){}
          if(d.shorts)try{localStorage.setItem("ntt_shorts_daily",JSON.stringify(d.shorts));}catch(e){}
          setAppData(Object.assign({},ex));
          if(d.people&&d.people.length&&window._nttLoggedInAs){
            var ln2=window._nttLoggedInAs.toLowerCase();
            var fp2=d.people.find(function(p){return p.name&&(p.name.toLowerCase()===ln2||p.name.toLowerCase().split(" ")[0]===ln2.split(" ")[0]);});
            if(fp2&&fp2.leads&&window._nttRefreshLeads){
              var sorted2=fp2.leads.slice().sort(function(a,b){return new Date(b.ts||0)-new Date(a.ts||0);});
              window._nttRefreshLeads(sorted2);
            }
          }
        }catch(e){}
      }).catch(function(){});
    };
    loadFb();
    var id=setInterval(loadFb,30000);
    return function(){clearInterval(id);};
  },[]);
  const login=(n)=>{try{setName(n);}catch(e){}};
  window._nttSetUser=function(n){try{setName(n);}catch(e){}};
  useEffect(function(){if(window._nttPendingLogin){var _p=window._nttPendingLogin;window._nttPendingLogin=null;setName(_p);}},[]);
  const logout=()=>{setName(null);window._nttLoggedInAs=null;document.getElementById("ntt-login-screen").style.display="flex";document.getElementById("ntt-pw").value="";setTimeout(function(){window.nttBuildNames&&window.nttBuildNames();},100);};
  const people=(appData.people)||[];
  if(!name)return<LoginScreen onLogin={login} people={people}/>;
  return<Dashboard pName={name} onLogout={logout} appData={appData}/>;
}

// ── ERROR BOUNDARY ────────────────────────────────────────────────────────────
class ErrorBoundary extends React.Component {
  constructor(props){super(props);this.state={err:null};}
  static getDerivedStateFromError(e){return {err:e};}
  componentDidCatch(e,info){console.error('NTT crash:',e,info);}
  render(){
    if(this.state.err){
      return(
        <div style={{minHeight:'100vh',background:'#0a0a0a',display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
          <div style={{background:'#fff',borderRadius:16,padding:24,maxWidth:360,width:'100%',textAlign:'center'}}>
            <div style={{fontSize:36,marginBottom:12}}>⚠️</div>
            <div style={{fontSize:16,fontWeight:800,marginBottom:8}}>Something went wrong</div>
            <div style={{fontSize:12,color:'#888',marginBottom:20}}>Your data is safe. Tap below to reload.</div>
            <button onClick={function(){window.location.reload();}} style={{width:'100%',padding:'12px',borderRadius:9,border:'none',background:'#1A6FAD',color:'#fff',fontSize:14,fontWeight:700,cursor:'pointer',marginBottom:10}}>Reload App</button>
            <button onClick={function(){try{localStorage.removeItem('ntt_v19_data');}catch(e){}window.location.reload();}} style={{width:'100%',padding:'12px',borderRadius:9,border:'1px solid #e57373',background:'#fff',color:'#C0392B',fontSize:13,fontWeight:700,cursor:'pointer'}}>Clear Cache &amp; Reload</button>
            <div style={{fontSize:10,color:'#aaa',marginTop:8}}>Use Clear Cache only if Reload does not work. Your data is saved to the cloud.</div>
          </div>
        </div>
      );
    }
    return this.props.children;
  }
}

ReactDOM.createRoot(document.getElementById("root")).render(<ErrorBoundary><SalesmanApp/></ErrorBoundary>);</script>
